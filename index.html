<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover" name="viewport"/>
<title>OARCEL | Document Manager</title>
<link href="manifest.json" rel="manifest"/>
<meta content="yes" name="apple-mobile-web-app-capable"/>
<meta content="black-translucent" name="apple-mobile-web-app-status-bar-style"/>
<meta content="OARCEL" name="apple-mobile-web-app-title"/>
<meta content="#0a1128" name="theme-color"/>
<link href="https://img.icons8.com/fluency/192/folder-invoices.png" rel="apple-touch-icon"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>

<link href="css/style.css" rel="stylesheet"/></head>
<body>
<div class="particles-container">
<div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div>
<div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div>
<div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div>
</div>
<div class="ambient-glow glow-1"></div>
<div class="ambient-glow glow-2"></div>
<div class="app">
<header class="header">
<div class="logo">
<div class="logo-inner"><i class="fas fa-folder-open"></i></div>
<div class="logo-ring"></div>
</div>
<div class="header-title">
<div class="main-line"><h1>OARCEL</h1><span class="doc-tag"><i class="fas fa-shield-alt"></i> Document Manager</span></div>
<div class="owner-name"><span class="owner-dot"></span><span>𝒜𝒷𝒾𝓈𝒽 𝑅𝒶𝒿𝒶𝓃</span></div>
</div>
</header>
<div class="top-bar">
<button class="btn-back hidden" id="backBtn"><i class="fas fa-arrow-left"></i><span>Back</span></button>
<div class="search-container">
<i class="fas fa-search"></i>
<input id="searchInput" placeholder="Search documents..." type="text"/>
<button class="clear-search hidden" id="clearSearchBtn"><i class="fas fa-times"></i></button>
</div>
<div class="top-bar-actions">
<div class="file-type-selector">
<button class="type-btn active" data-type="all">All</button>
<button class="type-btn" data-type="pdf">PDF</button>
<button class="type-btn" data-type="note">Notes</button>
</div>
<button class="theme-toggle" id="themeToggle"><div class="theme-icon-wrapper"><i class="fas fa-moon"></i></div></button>
<button class="btn-upload hidden" id="uploadBtn"><i class="fas fa-cloud-upload-alt"></i><span>Upload</span></button>
<button class="btn-create-note hidden" id="createNoteBtn"><i class="fas fa-pen"></i><span>New Note</span></button>
</div>
<input accept=".pdf,.txt,.md" id="fileInput" type="file"/>
</div>
<div class="stats-bar">
<div class="stat-item"><div class="stat-icon-bg"><i class="fas fa-folder"></i></div><div class="stat-data"><span class="stat-number" id="folderCount">0</span><label>Folders</label></div></div>
<div class="stat-divider"></div>
<div class="stat-item"><div class="stat-icon-bg stat-icon-files"><i class="fas fa-file-pdf"></i></div><div class="stat-data"><span class="stat-number" id="pdfCount">0</span><label>PDFs</label></div></div>
<div class="stat-divider"></div>
<div class="stat-item"><div class="stat-icon-bg stat-icon-notes"><i class="fas fa-file-alt"></i></div><div class="stat-data"><span class="stat-number" id="noteCount">0</span><label>Notes</label></div></div>
</div>
<nav class="breadcrumb" id="breadcrumb"></nav>
<div id="departmentsSection"></div>
<div class="search-result-info hidden" id="searchInfo"></div>
<div class="content" id="content"></div>
</div>
<!-- Create Note Modal -->
<div class="modal" id="noteModal">
<div class="modal-content">
<div class="modal-header">
<h3><i class="fas fa-pen"></i> Create New Note</h3>
<button class="close-modal" onclick="closeNoteModal()">×</button>
</div>
<div class="modal-body">
<input id="noteTitle" placeholder="Note title..." style="margin-bottom: 16px;" type="text"/>
<textarea id="noteContent" placeholder="Write your note here..."></textarea>
</div>
<div class="modal-footer">
<button class="btn-cancel" onclick="closeNoteModal()">Cancel</button>
<button class="btn-save" onclick="saveNote()">Save Note</button>
</div>
</div>
</div>
<!-- View Note Modal -->
<div class="modal note-viewer" id="viewNoteModal">
<div class="modal-content">
<div class="modal-header">
<h3 id="viewNoteTitle"><i class="fas fa-file-alt"></i> Note</h3>
<button class="close-modal" onclick="closeViewNoteModal()">×</button>
</div>
<div class="modal-body">
<div class="note-content" id="viewNoteContent"></div>
</div>
<div class="modal-footer">
<button class="btn-cancel" onclick="closeViewNoteModal()">Close</button>
<button class="btn-save" id="editNoteBtn" onclick="editCurrentNote()" style="background: linear-gradient(135deg, #fbbf24, #d97706);">Edit</button>
</div>
</div>
</div>
<div class="toast hidden" id="toast"><div class="toast-icon"><i class="fas fa-check-circle"></i></div><span></span></div>
<div class="loading-overlay hidden" id="loadingOverlay"><div class="loading-spinner"><div class="spinner-ring"></div><div class="spinner-ring"></div><div class="spinner-ring"></div></div><p>Loading...</p></div>

<script src="js/app.js"></script></body>
</html>
