<div class="app">
    <!-- Header Section -->
    <header class="header">
        <div class="logo">
            <div class="logo-inner">O</div>
            <div class="logo-ring"></div>
        </div>
        <div class="header-title">
            <div class="main-line">
                <h1>OARCEL</h1>
                <span class="doc-tag"><i class="fas fa-shield-alt"></i> Document Manager</span>
            </div>
            <div class="owner-name">
                <span class="owner-dot"></span> Abish Rajan
            </div>
        </div>
    </header>

    <!-- Corrected Top Bar Section -->
    <div class="top-bar">
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search documents...">
            <button class="clear-search hidden"><i class="fas fa-times"></i></button>
        </div>
        
        <div class="top-bar-actions">
            <button class="btn-back">
                <i class="fas fa-arrow-left"></i>
                <span>Back</span>
            </button>
            <button class="theme-toggle" id="themeToggle">
                <div class="theme-icon-wrapper">
                    <i class="fas fa-moon"></i>
                </div>
            </button>
        </div>
    </div>
    
    <!-- Rest of your app content (stats, breadcrumbs, etc) -->
</div>
