<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>OARCEL | Document Manager</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    /* Using your colorful pattern as the background */
    --bg-wallpaper: url('https://replicate.delivery/xpbkg/nS2B8qGepLqP2A40E5rBq3S4J4K4J4K4J4K4J4K4J4K4J4K4/image.png');
    
    /* Updated glass for better readability against the colorful background */
    --glass-bg: rgba(255, 255, 255, 0.18); 
    --glass-border: rgba(255, 255, 255, 0.25);
    
    /* Using dark text so it stands out against the colorful pattern */
    --text-primary: #111111; 
    --accent: #333333;
}

body {
    font-family: -apple-system, sans-serif;
    min-height: 100vh;
    /* This setup uses the image as the entire background and keeps it fixed */
    background: var(--bg-wallpaper) no-repeat center center fixed;
    background-size: cover;
    color: var(--text-primary);
}

.app { 
    position: relative; 
    z-index: 10; 
    max-width: 1200px; 
    margin: 0 auto; 
    padding: 16px; 
    padding-bottom: 50px; /* Space for scrolling */
}

/* Glassmorphic containers */
.header, .stats-bar, .card, .action-bar, .top-bar, .breadcrumb {
    backdrop-filter: blur(14px); 
    -webkit-backdrop-filter: blur(14px);
    background: var(--glass-bg);
    border: 1px solid var(--glass-border); 
    border-radius: 24px;
}

.header { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; padding: 16px; border-radius: 28px; }
.logo { width: 48px; height: 48px; background: rgba(0,0,0,0.1); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; color: #333; }

.top-bar { display: flex; gap: 10px; padding: 10px; border-radius: 50px; margin-bottom: 16px; }
.search-container { flex: 1; position: relative; }
.search-container input { width: 100%; padding: 10px 40px; border-radius: 40px; background: rgba(0,0,0,0.08); border: 1px solid rgba(0,0,0,0.1); color: #000; outline: none; }
.search-container i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); opacity: 0.6; }

.stats-bar { display: flex; gap: 12px; padding: 15px; margin-bottom: 20px; text-align: center; }
.stat-item { flex: 1; }
.stat-item span { display: block; font-size: 1.2rem; font-weight: 800; }
.stat-item label { font-size: 0.7rem; opacity: 0.7; }

.departments-grid { display: grid; gap: 12px; margin-bottom: 20px; }
.dept-card { cursor: pointer; padding: 18px 25px; border-radius: 50px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; font-weight: bold; color: white; border: 1px solid rgba(255,255,255,0.25); box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
.dept-card:hover { transform: scale(1.02); }

/* Applying your colorful palette to the departments */
.dept-card[data-dept="REMELT"] { background: linear-gradient(90deg, #ff007f, #e60073); }
.dept-card[data-dept="CASTER"] { background: linear-gradient(90deg, #d63384, #b02a6b); }
.dept-card[data-dept="HRM"] { background: linear-gradient(90deg, #9b59b6, #8e44ad); }
.dept-card[data-dept="CRM"] { background: linear-gradient(90deg, #6f42c1, #59359a); }
.dept-card[data-dept="ANNEALING"] { background: linear-gradient(90deg, #4b6cb7, #182848); }
.dept-card[data-dept="TLL"] { background: linear-gradient(90deg, #2c3e50, #000000); }
.dept-card[data-dept="SLITTER"] { background: linear-gradient(90deg, #1e3c72, #2a5298); }
.dept-card[data-dept="UTILITY"] { background: linear-gradient(90deg, #20b2aa, #008b8b); }

.card { display: flex; align-items: center; gap: 12px; padding: 15px; margin-bottom: 8px; cursor: pointer; }
.card i { font-size: 1.3rem; }
.card-filename { flex: 1; font-weight: 600; font-size: 0.9rem; }

.breadcrumb { padding: 10px 20px; margin-bottom: 16px; font-size: 0.8rem; display: inline-flex; gap: 8px; align-items: center; }
.btn { border: none; padding: 10px 20px; border-radius: 40px; cursor: pointer; font-weight: 600; color: #fff; background: rgba(0,0,0,0.5); }
.action-bar { padding: 10px; display: flex; gap: 10px; justify-content: center; margin-bottom: 15px; border-radius: 50px; }

.pdf-viewer-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000; background: #000; display: flex; flex-direction: column; }
.pdf-canvas-wrapper { flex: 1; overflow: auto; display: flex; justify-content: center; background: #1a1a1a; }
.hidden { display: none !important; }
</style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="logo"><i class="fas fa-folder-open"></i></div>
        <div><h1 style="font-size:1.4rem">OARCEL</h1><p style="font-size:0.7rem; opacity:0.7">DOCUMENT MANAGER</p></div>
    </div>
    <div class="top-bar">
        <button id="backBtn" class="btn hidden" onclick="goBack()"><i class="fas fa-arrow-left"></i></button>
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search your documents..." oninput="render()">
        </div>
        <button id="uploadBtn" class="btn hidden" onclick="document.getElementById('fileInput').click()">Upload</button>
        <input type="file" id="fileInput" accept="application/pdf" multiple style="display:none">
    </div>
    <div class="stats-bar">
        <div class="stat-item"><span id="folderCount">0</span><label>Folders</label></div>
        <div class="stat-item"><span id="fileCount">0</span><label>Documents</label></div>
    </div>
    <div id="breadcrumb" class="breadcrumb"></div>
    <div id="departmentsSection" class="departments-grid"></div>
    <div id="content"></div>
</div>

<div id="pdfViewerModal" class="pdf-viewer-modal hidden">
    <div class="pdf-canvas-wrapper"><canvas id="pdfCanvas"></canvas></div>
    <div style="padding:15px; background:#000; display:flex; justify-content:center; gap:20px; border-top:1px solid #333">
        <button class="btn" onclick="zoomOut()">-</button>
        <button class="btn" onclick="zoomIn()">+</button>
        <button class="btn" style="background:#ef4444" onclick="closePDFViewer()">Close</button>
    </div>
</div>

<script>
let db, allFiles = {}, fileSystem = {}, currentPath = [], pdfDoc = null, currentScale = 1.0;

const defaultStructure = {
    "REMELT":{}, "CASTER":{}, "HRM":{}, "CRM":{}, "ANNEALING":{}, "TLL":{}, "SLITTER":{}, "UTILITY":{}
};

async function init() {
    const request = indexedDB.open('OarcelDB', 2);
    request.onupgradeneeded = (e) => {
        let db = e.target.result;
        if (!db.objectStoreNames.contains('files')) db.createObjectStore('files', { keyPath: 'id' });
        if (!db.objectStoreNames.contains('folderStructure')) db.createObjectStore('folderStructure', { keyPath: 'key' });
    };
    request.onsuccess = (e) => {
        db = e.target.result;
        loadFromDB();
    };
}

function loadFromDB() {
    const structReq = db.transaction('folderStructure', 'readonly').objectStore('folderStructure').get('structure');
    structReq.onsuccess = () => {
        fileSystem = structReq.result ? structReq.result.value : defaultStructure;
        const fileReq = db.transaction('files', 'readonly').objectStore('files').getAll();
        fileReq.onsuccess = () => {
            fileReq.result.forEach(f => allFiles[f.id] = f.files);
            render();
        };
    };
}

function saveToDB() {
    db.transaction('folderStructure', 'readwrite').objectStore('folderStructure').put({ key: 'structure', value: fileSystem });
    const tx = db.transaction('files', 'readwrite');
    const store = tx.objectStore('files');
    for (let path in allFiles) store.put({ id: path, files: allFiles[path] });
}

function render() {
    const depts = document.getElementById('departmentsSection');
    const content = document.getElementById('content');
    const bc = document.getElementById('breadcrumb');
    const query = document.getElementById('searchInput').value.toLowerCase();
    
    depts.innerHTML = ''; content.innerHTML = '';
    
    // Breadcrumb
    bc.innerHTML = `<span onclick="currentPath=[];render()"><i class="fas fa-home"></i> Home</span>`;
    currentPath.forEach((p, i) => bc.innerHTML += ` > <span onclick="currentPath=currentPath.slice(0,${i+1});render()">${p}</span>`);

    document.getElementById('backBtn').classList.toggle('hidden', currentPath.length === 0);
    document.getElementById('uploadBtn').classList.toggle('hidden', currentPath.length === 0);

    if (currentPath.length === 0) {
        for (let d in fileSystem) {
            const div = document.createElement('div');
            div.className = 'dept-card'; div.dataset.dept = d;
            div.innerHTML = `<span>${d}</span> <i class="fas fa-chevron-right"></i>`;
            div.onclick = () => { currentPath = [d]; render(); };
            depts.appendChild(div);
        }
    } else {
        const activeObj = currentPath.reduce((o, i) => o[i], fileSystem);
        const actions = document.createElement('div');
        actions.className = 'action-bar';
        actions.innerHTML = `<button class="btn" onclick="addFolder()">+ Folder</button>`;
        content.appendChild(actions);

        for (let folder in activeObj) {
            const div = document.createElement('div');
            div.className = 'card'; div.innerHTML = `<i class="fas fa-folder" style="color:#ffffff; opacity:0.9"></i><div class="card-filename">${folder}</div>`;
            div.onclick = () => { currentPath.push(folder); render(); };
            content.appendChild(div);
        }

        const files = allFiles[currentPath.join('/')] || [];
        files.filter(f => f.name.toLowerCase().includes(query)).forEach((f, i) => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<i class="fas fa-file-pdf" style="color:#ffffff"></i><div class="card-filename">${f.name}</div><button class="btn" style="background:none; border:none; padding:5px" onclick="event.stopPropagation();deleteFile(${i})"><i class="fas fa-trash-alt"></i></button>`;
            div.onclick = () => openPDF(f.data);
            content.appendChild(div);
        });
    }
    updateStats();
}

function updateStats() {
    let fCount = 0; for (let p in allFiles) fCount += allFiles[p].length;
    document.getElementById('fileCount').textContent = fCount;
    document.getElementById('folderCount').textContent = Object.keys(fileSystem).length;
}

function addFolder() {
    const n = prompt("Folder Name:");
    if (!n) return;
    currentPath.reduce((o, i) => o[i], fileSystem)[n] = {};
    saveToDB(); render();
}

function deleteFile(i) {
    if (confirm("Delete file?")) {
        allFiles[currentPath.join('/')].splice(i, 1);
        saveToDB(); render();
    }
}

function goBack() { currentPath.pop(); render(); }

document.getElementById('fileInput').onchange = (e) => {
    const path = currentPath.join('/');
    if (!allFiles[path]) allFiles[path] = [];
    Array.from(e.target.files).forEach(file => {
        const r = new FileReader();
        r.onload = (ev) => {
            allFiles[path].push({ name: file.name, data: ev.target.result });
            saveToDB(); render();
        };
        r.readAsDataURL(file);
    });
};

async function openPDF(d) {
    document.getElementById('pdfViewerModal').classList.remove('hidden');
    const loadingTask = pdfjsLib.getDocument(d);
    pdfDoc = await loadingTask.promise;
    currentScale = 1.0; renderPage(1);
}
async function renderPage(n) {
    const page = await pdfDoc.getPage(n);
    const canvas = document.getElementById('pdfCanvas');
    const viewport = page.getViewport({ scale: currentScale });
    canvas.height = viewport.height; canvas.width = viewport.width;
    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
}
function zoomIn() { currentScale += 0.2; renderPage(1); }
function zoomOut() { if(currentScale > 0.4) currentScale -= 0.2; renderPage(1); }
function closePDFViewer() { document.getElementById('pdfViewerModal').classList.add('hidden'); }

init();
</script>
</body>
</html>
