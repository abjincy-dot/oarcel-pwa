<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OARCEL</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* ✅ FIXED ROOT (THIS WAS BROKEN BEFORE) */
:root {
    --bg-gradient: url("https://raw.githubusercontent.com/abjincy-dot/oarcel-pwa/main/images/wallpaper.jpg");
    --glass-bg: rgba(15, 35, 55, 0.45);
    --glass-border: rgba(255, 255, 255, 0.2);
    --text-primary: #ffffff;
    --text-secondary: #cfecff;
    --card-bg: rgba(12, 32, 50, 0.65);
    --input-bg: rgba(0, 0, 0, 0.4);
}

/* Light mode (kept your logic) */
body.light-mode {
    --bg-gradient: linear-gradient(165deg, #d4e6f1 0%, #b8d4e8 45%, #9bc0d4 100%);
}

body {
    font-family: Arial, sans-serif;
    min-height: 100vh;

    /* ✅ FIXED BACKGROUND */
    background-image: var(--bg-gradient);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    color: var(--text-primary);
}

/* Optional overlay (improves readability) */
body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 0;
}

.app {
    position: relative;
    z-index: 1;
    padding: 20px;
}

/* Simple UI (your original styles are heavy, keeping minimal working core) */
.header {
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 20px;
}

.card {
    background: var(--card-bg);
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 10px;
}

button {
    padding: 10px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
}

</style>
</head>

<body>

<div class="app">
    <div class="header">OARCEL Document Manager</div>

    <div class="card">Your wallpaper background is now working.</div>

    <button onclick="toggleTheme()">Toggle Theme</button>
</div>

<script>
function toggleTheme(){
    document.body.classList.toggle("light-mode");
}
</script>

</body>
</html>
