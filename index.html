<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Departments | Compact UI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f1f5f9;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px 16px;
    }

    /* main card container – matches the “dashboard” style from image */
    .dashboard {
      max-width: 680px;
      width: 100%;
      background: white;
      border-radius: 32px;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1), 0 1px 3px rgba(0, 0, 0, 0.05);
      overflow: hidden;
      transition: all 0.2s ease;
    }

    /* subtle header like a clean bar */
    .header-bar {
      padding: 20px 24px 12px 24px;
      border-bottom: 1px solid #e9edf2;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .title-section h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #1e2a3a, #0f172a);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .title-section .badge-stats {
      display: flex;
      gap: 12px;
      margin-top: 6px;
      font-size: 0.75rem;
      color: #4b5563;
    }

    .stats-chip {
      background: #eef2ff;
      padding: 4px 10px;
      border-radius: 40px;
      font-weight: 500;
    }

    /* 🟢 MERGED BUTTON – small, compact, replaces both "Add Department" text + button */
    .merged-add-btn {
      background: #0f172a;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 60px;
      font-size: 0.85rem;
      font-weight: 500;
      color: white;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
      backdrop-filter: blur(0px);
      letter-spacing: 0.2px;
    }

    .merged-add-btn svg {
      width: 18px;
      height: 18px;
      stroke: white;
      stroke-width: 2;
      fill: none;
      transition: transform 0.2s ease;
    }

    .merged-add-btn:hover {
      background: #2d3a5e;
      transform: scale(0.97);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    .merged-add-btn:active {
      transform: scale(0.95);
    }

    /* search & files row (from original mockup) */
    .search-area {
      padding: 16px 24px 8px 24px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border-bottom: 1px solid #edf2f7;
    }

    .search-wrapper {
      flex: 2;
      min-width: 160px;
      display: flex;
      align-items: center;
      background: #f8fafc;
      border-radius: 60px;
      border: 1px solid #e2e8f0;
      padding: 6px 14px;
      transition: all 0.2s;
    }

    .search-wrapper:focus-within {
      border-color: #94a3b8;
      background: white;
      box-shadow: 0 0 0 2px rgba(15, 23, 42, 0.08);
    }

    .search-icon {
      width: 16px;
      height: 16px;
      stroke: #5b6e8c;
      stroke-width: 2;
      margin-right: 8px;
    }

    .search-wrapper input {
      border: none;
      background: transparent;
      font-size: 0.9rem;
      width: 100%;
      outline: none;
      padding: 6px 0;
      font-weight: 450;
      color: #0f172a;
    }

    .search-wrapper input::placeholder {
      color: #94a3b8;
      font-weight: 400;
    }

    /* file select zone (like "Choose Files" area) */
    .file-zone {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #f9fbfd;
      padding: 6px 12px;
      border-radius: 48px;
      border: 1px solid #e2edf2;
    }

    .file-label {
      background: white;
      border: 1px solid #cbd5e1;
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 500;
      color: #1e293b;
      cursor: pointer;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .file-label:hover {
      background: #f1f5f9;
      border-color: #94a3b8;
    }

    .file-status {
      font-size: 0.75rem;
      color: #475569;
      font-weight: 450;
    }

    /* stats row: Folders & Documents */
    .stats-row {
      display: flex;
      gap: 24px;
      padding: 16px 24px;
      background: #ffffff;
      border-bottom: 1px solid #edf2f7;
    }

    .stat-item {
      background: #fefce8;
      padding: 8px 16px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #2c3e50;
    }

    .stat-number {
      background: #0f172a;
      color: white;
      padding: 2px 8px;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 500;
    }

    /* Department list – clean grid / flex */
    .dept-container {
      padding: 16px 20px 28px 20px;
    }

    .dept-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    /* each department pill style – matches "REMELT, CASTER, HRM..." */
    .dept-pill {
      background: #f1f5f9;
      padding: 8px 18px;
      border-radius: 60px;
      font-size: 0.85rem;
      font-weight: 500;
      color: #0c4a6e;
      transition: all 0.15s ease;
      border: 1px solid #e2e8f0;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: default;
      letter-spacing: -0.2px;
    }

    .dept-pill:hover {
      background: #e6edf5;
      transform: translateY(-1px);
      border-color: #cbd5e1;
    }

    /* remove default button styles and provide small interactive */
    .empty-message {
      color: #6c757d;
      font-style: italic;
      font-size: 0.85rem;
      padding: 12px;
    }

    /* interactive add department modal / inline addition simulation */
    .inline-add-panel {
      margin-top: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      background: #fafcff;
      padding: 12px 16px;
      border-radius: 60px;
      border: 1px dashed #cbd5e6;
    }

    .inline-add-panel input {
      flex: 2;
      min-width: 140px;
      border: 1px solid #cbd5e1;
      background: white;
      padding: 8px 14px;
      border-radius: 60px;
      font-size: 0.85rem;
      outline: none;
      transition: all 0.2s;
    }

    .inline-add-panel input:focus {
      border-color: #0f172a;
      box-shadow: 0 0 0 2px rgba(15, 23, 42, 0.1);
    }

    .small-confirm {
      background: #0f172a;
      border: none;
      padding: 7px 18px;
      border-radius: 40px;
      color: white;
      font-weight: 500;
      font-size: 0.75rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    .small-confirm:hover {
      background: #2c3e66;
    }

    .cancel-add {
      background: transparent;
      border: 1px solid #cbd5e1;
      padding: 6px 16px;
      border-radius: 40px;
      font-size: 0.7rem;
      cursor: pointer;
    }

    .notice {
      font-size: 0.7rem;
      color: #4a5b6e;
      margin-top: 12px;
      text-align: center;
    }

    hr {
      margin: 0 24px;
      border-color: #edf2f7;
    }

    @media (max-width: 520px) {
      .header-bar {
        flex-direction: column;
        align-items: flex-start;
      }
      .stats-row {
        flex-wrap: wrap;
      }
      .dept-grid {
        gap: 10px;
      }
      .merged-add-btn {
        padding: 6px 14px;
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>
<div class="dashboard">
  <!-- header area with merged button exactly where "Add Department" and button used to be -->
  <div class="header-bar">
    <div class="title-section">
      <h1>Department Hub</h1>
      <div class="badge-stats">
        <span class="stats-chip">📁 Active workspaces</span>
        <span class="stats-chip">⚙️ Production</span>
      </div>
    </div>
    <!-- 🟢 MERGED BUTTON: replaces both "Add Department" text and the separate button.
         It is small, compact, and contains both text "Add Department" and a plus icon.
         No extra text beside it, no full row – just this neat button. -->
    <button class="merged-add-btn" id="openAddPanelBtn">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 5v14M5 12h14" />
      </svg>
      <span>Add Department</span>
    </button>
  </div>

  <!-- search and file picker section (preserve original look) -->
  <div class="search-area">
    <div class="search-wrapper">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="10.5" cy="10.5" r="6.5" />
        <path d="M15 15L21 21" />
      </svg>
      <input type="text" placeholder="Search PDFs or departments..." id="searchDeptInput">
    </div>
    <div class="file-zone">
      <label for="fileInputElem" class="file-label">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z" />
          <polyline points="13 2 13 9 20 9" />
        </svg>
        Choose Files
      </label>
      <input type="file" id="fileInputElem" multiple style="display: none;">
      <span class="file-status" id="fileStatusMsg">no files selected</span>
    </div>
  </div>

  <!-- stats row: Folders & Documents (exactly as per image but interactive counts) -->
  <div class="stats-row">
    <div class="stat-item">
      📂 Folders
      <span class="stat-number" id="folderCount">90</span>
    </div>
    <div class="stat-item">
      📄 Documents
      <span class="stat-number" id="documentCount">1</span>
    </div>
  </div>

  <!-- department list section (dynamic) -->
  <div class="dept-container">
    <div class="dept-grid" id="departmentList">
      <!-- initial departments: REMELT, CASTER, HRM, CRM, ANNEALING, TLL, SLITTER -->
    </div>

    <!-- inline panel for adding new department (hidden by default, appears when merged button clicked) -->
    <div id="inlineAddSection" style="display: none;" class="inline-add-panel">
      <input type="text" id="newDeptName" placeholder="Department name (e.g., FINISHING)" autocomplete="off">
      <button id="confirmAddDeptBtn" class="small-confirm">➕ Add</button>
      <button id="cancelAddDeptBtn" class="cancel-add">Cancel</button>
    </div>
    <div class="notice" id="actionFeedback"></div>
  </div>
</div>

<script>
  // ---------- INITIAL DEPARTMENTS (from the list in the image) ----------
  let departments = [
    "REMELT",
    "CASTER",
    "HRM",
    "CRM",
    "ANNEALING",
    "TLL",
    "SLITTER"
  ];

  // Folders / Documents counts (matching initial UI: 90 folders, 1 document)
  let foldersCount = 90;
  let documentsCount = 1;

  // DOM elements
  const deptGrid = document.getElementById("departmentList");
  const folderSpan = document.getElementById("folderCount");
  const docSpan = document.getElementById("documentCount");
  const searchInput = document.getElementById("searchDeptInput");
  const fileInput = document.getElementById("fileInputElem");
  const fileStatusSpan = document.getElementById("fileStatusMsg");
  const openAddBtn = document.getElementById("openAddPanelBtn");
  const inlineAddSection = document.getElementById("inlineAddSection");
  const newDeptNameInput = document.getElementById("newDeptName");
  const confirmAddBtn = document.getElementById("confirmAddDeptBtn");
  const cancelAddBtn = document.getElementById("cancelAddDeptBtn");
  const feedbackDiv = document.getElementById("actionFeedback");

  // Helper: update department list UI (filter based on search term)
  function renderDepartments() {
    const searchTerm = searchInput.value.trim().toLowerCase();
    let filteredDepts = departments;
    if (searchTerm !== "") {
      filteredDepts = departments.filter(dept => dept.toLowerCase().includes(searchTerm));
    }

    if (filteredDepts.length === 0) {
      deptGrid.innerHTML = `<div class="empty-message">✨ No matching departments. Click "Add Department" to create one.</div>`;
      return;
    }

    deptGrid.innerHTML = filteredDepts.map(dept => `
      <div class="dept-pill" data-dept="${dept.replace(/"/g, '&quot;')}">
        🏭 ${escapeHtml(dept)}
      </div>
    `).join('');
  }

  // simple escape to avoid injection
  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
      return c;
    });
  }

  // update folders & documents display
  function updateStatsDisplay() {
    folderSpan.innerText = foldersCount;
    docSpan.innerText = documentsCount;
  }

  // add new department (case-insensitive uniqueness, trim)
  function addDepartment(newNameRaw) {
    let newName = newNameRaw.trim();
    if (newName === "") {
      showTemporaryFeedback("❌ Department name cannot be empty.", "#b91c1c");
      return false;
    }
    // check for duplicates (case-insensitive)
    const exists = departments.some(dept => dept.toLowerCase() === newName.toLowerCase());
    if (exists) {
      showTemporaryFeedback(`⚠️ "${newName}" already exists.`, "#b45309");
      return false;
    }
    departments.push(newName);
    // after adding, increment documents count? just to match dynamic feel (but original document count increments slightly)
    documentsCount += 1;
    // optionally increment folders count if we want dynamic? but keep original logic: folders remain 90, but we can add small synergy
    // but original spec: folders = 90, documents = 1 initially. Each new department increases documents by 1 (makes sense)
    updateStatsDisplay();
    renderDepartments();
    showTemporaryFeedback(`✅ Department "${newName}" added successfully.`, "#15803d");
    // scroll to show new entry? just smooth
    return true;
  }

  // small feedback message that disappears after 2.2 sec
  let feedbackTimeout;
  function showTemporaryFeedback(msg, color = "#0f172a") {
    if (feedbackTimeout) clearTimeout(feedbackTimeout);
    feedbackDiv.innerText = msg;
    feedbackDiv.style.color = color;
    feedbackDiv.style.fontWeight = "500";
    feedbackDiv.style.opacity = "1";
    feedbackTimeout = setTimeout(() => {
      feedbackDiv.innerText = "";
      feedbackDiv.style.color = "";
    }, 2200);
  }

  // handle file selection (update file status text)
  function updateFileStatus() {
    if (fileInput.files.length === 0) {
      fileStatusSpan.innerText = "no files selected";
    } else {
      const fileNames = Array.from(fileInput.files).map(f => f.name).join(", ");
      const shortMsg = fileNames.length > 40 ? fileNames.substring(0, 40) + "…" : fileNames;
      fileStatusSpan.innerText = shortMsg || `${fileInput.files.length} file(s) selected`;
      // bonus: as per mockup, when files selected, we could increment document count? but keep optional. Let's not break expectation.
      // However, to match interactive joy: we update document count if new files added beyond initial doc count? But we just show status.
      // For consistency we'll also set a subtle hint: not modify counts automatically, but give user friendly console.
    }
  }

  // reset add panel and hide it
  function hideAddPanel() {
    inlineAddSection.style.display = "none";
    newDeptNameInput.value = "";
  }

  function showAddPanel() {
    inlineAddSection.style.display = "flex";
    newDeptNameInput.focus();
  }

  // Event handlers for merged button: click shows inline panel (small compact)
  openAddBtn.addEventListener("click", (e) => {
    e.preventDefault();
    // if panel visible already we just focus, else show
    if (inlineAddSection.style.display === "none" || inlineAddSection.style.display === "") {
      showAddPanel();
    } else {
      newDeptNameInput.focus();
    }
  });

  // confirm add logic
  function handleConfirmAdd() {
    const deptName = newDeptNameInput.value;
    const success = addDepartment(deptName);
    if (success) {
      hideAddPanel();
      // after adding, clear search if we want to show newly added, but maintain search state? keep search as is.
      // re-render already called inside addDepartment. Optionally clear search? Not needed.
      // also ensure that if search filter is active but new department doesn't match, it's fine.
    } else {
      // keep panel open, just highlight error
      newDeptNameInput.style.border = "1px solid #e11d48";
      setTimeout(() => {
        newDeptNameInput.style.border = "";
      }, 800);
    }
  }

  confirmAddBtn.addEventListener("click", handleConfirmAdd);
  cancelAddBtn.addEventListener("click", () => {
    hideAddPanel();
    newDeptNameInput.value = "";
  });

  // allow Enter key in input field
  newDeptNameInput.addEventListener("keypress", (e) => {
    if (e.key === "Enter") {
      e.preventDefault();
      handleConfirmAdd();
    }
  });

  // search filtering
  searchInput.addEventListener("input", () => {
    renderDepartments();
  });

  // File input change event
  fileInput.addEventListener("change", () => {
    updateFileStatus();
    // optional but friendly: when files uploaded, we can optionally update document count?
    // Actually the original design shows "Documents: 1", but if user selects multiple files we can increase
    // the documents count to show dynamic feedback. Keep it intuitive: each time files selected, we increase documents count by number of newly selected files.
    // However we avoid double counting if same file reselect, but for clean UX we'll set new document count based on total unique file count? 
    // Since spec not rigid but I'll increment documents count by added files, but ensure it doesn't break.
    if (fileInput.files.length > 0) {
      const newFilesCount = fileInput.files.length;
      // but documents represent total documents in system? I'll update to reflect total selected files for demo
      // But preserve original folder count (90) stays. we set documentsCount = previous + new files? no, but we'll just display the count as max(previous, files length).
      // Better: documentsCount represents the number of documents uploaded/available. Each file select adds to cumulative documents? 
      // To keep consistent and realistic, let documentsCount be the count of files currently selected (makes sense for context)
      documentsCount = fileInput.files.length;
      if (documentsCount === 0) documentsCount = 1; // default if no files (like original one doc)
      if (fileInput.files.length === 0 && documentsCount === 0) documentsCount = 1;
      updateStatsDisplay();
      showTemporaryFeedback(`📎 ${fileInput.files.length} file(s) attached. Document counter updated.`, "#2563eb");
    } else {
      documentsCount = 1;
      updateStatsDisplay();
    }
  });

  // Additional: simulate the "Folders" count stays 90, but we could allow dynamic based on dept groups? But spec: keep folders count = 90. 
  // we don't change foldersCount to keep UI consistent with initial image. However user can add departments and folders count remains 90.
  // But the mockup had 90 folders and 1 doc. It's fine.

  // Bonus: initialize file status and stats
  updateFileStatus();
  renderDepartments();
  updateStatsDisplay();

  // small extra: when we click on a department pill, maybe a toast? optional but not needed, but provides nice feeling.
  // but not required. clean.

  // handle case where hide panel if clicked outside? but not necessary, because merged button toggles? better user experience: merged button only shows panel
  // If panel is open, clicking merged button again does not close, but we could keep as is. But clicking cancel closes. Also we can close by pressing ESC?
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && inlineAddSection.style.display === "flex") {
      hideAddPanel();
      newDeptNameInput.value = "";
      showTemporaryFeedback("Cancelled adding department.", "#4b5563");
    }
  });

  // small improvement: change background of merged button active ripple
  console.log("Merged button ready — small compact button with integrated text + icon");
</script>
</body>
</html>
