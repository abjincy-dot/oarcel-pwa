<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Department Hub · Compact Manager</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #eef2f9 0%, #e0e8f2 100%);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }

    /* MAIN CARD */
    .hub-card {
      max-width: 820px;
      width: 100%;
      background: #ffffff;
      border-radius: 2rem;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 2px 6px rgba(0, 0, 0, 0.02);
      transition: all 0.2s;
      overflow: hidden;
    }

    /* Header area: title + compact merged button */
    .card-header {
      padding: 1.5rem 1.75rem 0.75rem 1.75rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      border-bottom: 1px solid #edf2f7;
    }

    .title-block h1 {
      font-size: 1.7rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #0f172a, #1e2b3c);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .chip-group {
      display: flex;
      gap: 0.7rem;
      margin-top: 0.4rem;
    }

    .chip {
      background: #f1f5f9;
      padding: 0.2rem 0.85rem;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 500;
      color: #1e293b;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }

    /* 🔥 MERGED BUTTON — small, compact, contains both icon + text */
    .merged-department-btn {
      background: #0f172a;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.55rem 1.2rem;
      border-radius: 60px;
      font-size: 0.85rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
      letter-spacing: 0.2px;
    }

    .merged-department-btn svg {
      width: 18px;
      height: 18px;
      stroke: white;
      stroke-width: 2.2;
      fill: none;
    }

    .merged-department-btn:hover {
      background: #2c3e66;
      transform: scale(0.96);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
    }

    .merged-department-btn:active {
      transform: scale(0.94);
    }

    /* search + file row */
    .action-row {
      padding: 1rem 1.75rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      background: #fefefe;
      border-bottom: 1px solid #ecf3f9;
    }

    .search-box {
      flex: 2;
      min-width: 180px;
      display: flex;
      align-items: center;
      background: #f8fafd;
      border: 1px solid #e2edf2;
      border-radius: 60px;
      padding: 0.45rem 1rem;
      transition: all 0.2s;
    }

    .search-box:focus-within {
      border-color: #8ba0bc;
      background: white;
      box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.05);
    }

    .search-box svg {
      width: 16px;
      height: 16px;
      stroke: #6b7c93;
      margin-right: 8px;
    }

    .search-box input {
      border: none;
      background: transparent;
      width: 100%;
      font-size: 0.85rem;
      outline: none;
      font-weight: 450;
      color: #0f172a;
    }

    .search-box input::placeholder {
      color: #9aaebf;
    }

    .file-picker {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      background: #fbfdff;
      padding: 0.25rem 0.5rem 0.25rem 0.2rem;
      border-radius: 60px;
      border: 1px solid #e9edf2;
    }

    .file-label-btn {
      background: white;
      border: 1px solid #cbdde9;
      padding: 0.45rem 1rem;
      border-radius: 40px;
      font-size: 0.72rem;
      font-weight: 600;
      color: #1e2f41;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: all 0.15s;
    }

    .file-label-btn:hover {
      background: #f1f7fe;
      border-color: #9bb1c7;
    }

    .file-status-text {
      font-size: 0.7rem;
      color: #4a627a;
      font-weight: 450;
      max-width: 180px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* stats row */
    .stats-container {
      padding: 0.8rem 1.75rem;
      display: flex;
      gap: 1.8rem;
      background: #ffffff;
      border-bottom: 1px solid #ecf3f9;
    }

    .stat-pill {
      background: #f8fafc;
      padding: 0.45rem 1.2rem;
      border-radius: 60px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #0f172a;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      border: 1px solid #eef3fc;
    }

    .stat-number {
      background: #0f172a;
      color: white;
      padding: 0.15rem 0.65rem;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    /* departments grid */
    .dept-panel {
      padding: 1.5rem 1.5rem 1.8rem 1.5rem;
    }

    .dept-badge-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .dept-item {
      background: #f1f5f9;
      padding: 0.55rem 1.3rem;
      border-radius: 60px;
      font-size: 0.85rem;
      font-weight: 500;
      color: #0c4a6e;
      border: 1px solid #e2e8f0;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      cursor: default;
      backdrop-filter: blur(2px);
    }

    .dept-item:hover {
      background: #e9f0f8;
      transform: translateY(-1px);
      border-color: #bdd3e8;
    }

    .empty-dept-message {
      background: #fef9e3;
      padding: 1rem 1.5rem;
      border-radius: 40px;
      text-align: center;
      font-size: 0.85rem;
      color: #a16207;
      width: 100%;
    }

    /* inline add panel (compact & modern) */
    .inline-add-card {
      margin-top: 0.5rem;
      background: #fafcff;
      border-radius: 60px;
      padding: 0.7rem 1rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.8rem;
      border: 1px solid #dee9f2;
      transition: all 0.2s;
    }

    .inline-add-card input {
      flex: 2;
      min-width: 150px;
      padding: 0.6rem 1rem;
      border-radius: 60px;
      border: 1px solid #cfdfee;
      background: white;
      font-size: 0.85rem;
      outline: none;
      transition: 0.15s;
    }

    .inline-add-card input:focus {
      border-color: #0f172a;
      box-shadow: 0 0 0 2px rgba(15, 23, 42, 0.1);
    }

    .confirm-add {
      background: #0f172a;
      border: none;
      padding: 0.5rem 1.3rem;
      border-radius: 40px;
      color: white;
      font-weight: 600;
      font-size: 0.75rem;
      cursor: pointer;
      transition: 0.15s;
    }

    .confirm-add:hover {
      background: #1f3a5f;
    }

    .cancel-add {
      background: transparent;
      border: 1px solid #b9cfec;
      padding: 0.45rem 1.2rem;
      border-radius: 40px;
      font-size: 0.7rem;
      cursor: pointer;
      font-weight: 500;
      color: #3b5a7c;
    }

    .cancel-add:hover {
      background: #f0f4fa;
    }

    .feedback-message {
      margin-top: 1rem;
      font-size: 0.75rem;
      text-align: center;
      font-weight: 500;
      padding: 0.3rem;
      color: #2c6e2c;
      transition: all 0.1s;
    }

    hr {
      margin: 0 1.5rem;
      border-color: #edf2f9;
    }

    @media (max-width: 580px) {
      .card-header {
        flex-direction: column;
        align-items: flex-start;
      }
      .stats-container {
        flex-wrap: wrap;
      }
      .file-status-text {
        max-width: 130px;
      }
      .merged-department-btn {
        padding: 0.45rem 1rem;
      }
    }
  </style>
</head>
<body>

<div class="hub-card">
  <!-- header: title + MERGED button (small, compact, no extra row) -->
  <div class="card-header">
    <div class="title-block">
      <h1>Department Hub</h1>
      <div class="chip-group">
        <span class="chip">⚙️ Active workspaces</span>
        <span class="chip">🏭 Production</span>
      </div>
    </div>
    <!-- ✅ MERGED BUTTON: text "Add Department" + plus icon, small & compact, single element -->
    <button class="merged-department-btn" id="mergedAddDepartmentBtn">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 5v14M5 12h14" />
      </svg>
      <span>Add Department</span>
    </button>
  </div>

  <!-- search + choose files (fully interactive) -->
  <div class="action-row">
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="10.5" cy="10.5" r="6.5" />
        <path d="M15 15L21 21" />
      </svg>
      <input type="text" id="searchDepartmentInput" placeholder="Search PDFs or departments...">
    </div>
    <div class="file-picker">
      <label for="chooseFilesInput" class="file-label-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z" />
          <polyline points="13 2 13 9 20 9" />
        </svg>
        Choose Files
      </label>
      <input type="file" id="chooseFilesInput" multiple style="display: none;">
      <span class="file-status-text" id="fileStatusMsg">no files selected</span>
    </div>
  </div>

  <!-- folders & documents stats -->
  <div class="stats-container">
    <div class="stat-pill">
      📂 Folders
      <span class="stat-number" id="foldersCountDisplay">90</span>
    </div>
    <div class="stat-pill">
      📄 Documents
      <span class="stat-number" id="documentsCountDisplay">1</span>
    </div>
  </div>

  <!-- department grid list + inline add panel -->
  <div class="dept-panel">
    <div class="dept-badge-grid" id="departmentGridContainer">
      <!-- dynamic departments injected here -->
    </div>

    <!-- hidden inline form for adding new department (appears only when merged button clicked) -->
    <div id="inlineDepartmentForm" style="display: none;" class="inline-add-card">
      <input type="text" id="newDepartmentNameInput" placeholder="e.g., FINISHING, LOGISTICS" autocomplete="off">
      <button id="confirmAddDeptBtn" class="confirm-add">✔ Add</button>
      <button id="cancelAddDeptBtn" class="cancel-add">Cancel</button>
    </div>

    <div id="globalFeedback" class="feedback-message"></div>
  </div>
</div>

<script>
  // ---------- PURE JS LOGIC - FULLY FUNCTIONAL, NO DEAD UI ----------
  // Initial departments from the reference image
  let departmentsArray = [
    "REMELT",
    "CASTER",
    "HRM",
    "CRM",
    "ANNEALING",
    "TLL",
    "SLITTER"
  ];

  // State for stats
  let foldersCount = 90;      // fixed as per original image
  let documentsCount = 1;     // starts at 1 (like original screenshot)

  // DOM Elements
  const deptGridContainer = document.getElementById("departmentGridContainer");
  const foldersSpan = document.getElementById("foldersCountDisplay");
  const documentsSpan = document.getElementById("documentsCountDisplay");
  const searchInputField = document.getElementById("searchDepartmentInput");
  const mergedBtn = document.getElementById("mergedAddDepartmentBtn");
  const inlineFormDiv = document.getElementById("inlineDepartmentForm");
  const newDeptInput = document.getElementById("newDepartmentNameInput");
  const confirmAddBtn = document.getElementById("confirmAddDeptBtn");
  const cancelAddBtn = document.getElementById("cancelAddDeptBtn");
  const feedbackSpan = document.getElementById("globalFeedback");
  const fileInputElement = document.getElementById("chooseFilesInput");
  const fileStatusSpan = document.getElementById("fileStatusMsg");

  // Helper: escape HTML to avoid injection
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(ch) {
      return ch;
    });
  }

  // Show temporary feedback (auto-clear)
  let feedbackTimer = null;
  function showFeedback(message, isError = false) {
    if (feedbackTimer) clearTimeout(feedbackTimer);
    feedbackSpan.innerText = message;
    feedbackSpan.style.color = isError ? "#b91c1c" : "#166534";
    feedbackSpan.style.fontWeight = "500";
    feedbackTimer = setTimeout(() => {
      feedbackSpan.innerText = "";
      feedbackSpan.style.color = "";
    }, 2500);
  }

  // Render department list with search filter
  function renderDepartments() {
    const searchTerm = searchInputField.value.trim().toLowerCase();
    let filteredList = departmentsArray;
    if (searchTerm !== "") {
      filteredList = departmentsArray.filter(dept => dept.toLowerCase().includes(searchTerm));
    }

    if (filteredList.length === 0) {
      deptGridContainer.innerHTML = `<div class="empty-dept-message">🔍 No matching departments. Click "Add Department" to create one.</div>`;
      return;
    }

    deptGridContainer.innerHTML = filteredList.map(dept => `
      <div class="dept-item">
        🧩 ${escapeHtml(dept)}
      </div>
    `).join('');
  }

  // Update stats (folders & documents)
  function updateStatsUI() {
    foldersSpan.innerText = foldersCount;
    documentsSpan.innerText = documentsCount;
  }

  // Add new department (case-insensitive duplicate check)
  function addDepartment(newRawName) {
    let cleanName = newRawName.trim();
    if (cleanName === "") {
      showFeedback("❌ Department name cannot be empty.", true);
      return false;
    }
    // duplicate check (case-insensitive)
    const alreadyExists = departmentsArray.some(dept => dept.toLowerCase() === cleanName.toLowerCase());
    if (alreadyExists) {
      showFeedback(`⚠️ Department "${cleanName}" already exists.`, true);
      return false;
    }
    departmentsArray.push(cleanName);
    // increase documents count as a natural interaction (each new department adds a related document)
    documentsCount += 1;
    updateStatsUI();
    renderDepartments();
    showFeedback(`✅ Department "${cleanName}" added successfully!`, false);
    return true;
  }

  // Hide inline add panel and clear input
  function hideAddPanel() {
    inlineFormDiv.style.display = "none";
    newDeptInput.value = "";
  }

  function showAddPanel() {
    inlineFormDiv.style.display = "flex";
    newDeptInput.focus();
  }

  // confirm add handler
  function handleAddConfirm() {
    const deptName = newDeptInput.value;
    const success = addDepartment(deptName);
    if (success) {
      hideAddPanel();
      // after adding new department, clear search if needed? but better preserve search state, but we'll re-render with current search
      // re-render already called inside addDepartment
    } else {
      // keep panel open, highlight input briefly
      newDeptInput.style.border = "1px solid #e11d48";
      setTimeout(() => { newDeptInput.style.border = ""; }, 600);
    }
  }

  // ----- FILE HANDLER (interactive, changes documents count & status)
  function updateFileSelectionStatus() {
    const files = fileInputElement.files;
    if (files.length === 0) {
      fileStatusSpan.innerText = "no files selected";
      // if no files and documentsCount is 0? but we keep base 1 if nothing selected? ensure consistency
      if (documentsCount === 0) documentsCount = 1;
      updateStatsUI();
    } else {
      const fileNames = Array.from(files).map(f => f.name).join(", ");
      const shortPreview = fileNames.length > 38 ? fileNames.substring(0, 38) + "…" : fileNames;
      fileStatusSpan.innerText = shortPreview || `${files.length} file(s)`;
      // update documents count based on selected files (realistic interactive)
      documentsCount = files.length;
      if (documentsCount === 0) documentsCount = 1;
      updateStatsUI();
      showFeedback(`📎 ${files.length} file(s) selected. Documents updated.`, false);
    }
  }

  // reset file status on load
  function initFileListener() {
    fileInputElement.addEventListener("change", () => {
      updateFileSelectionStatus();
    });
    // initial call
    updateFileSelectionStatus();
  }

  // ---- SEARCH EVENT ----
  function initSearch() {
    searchInputField.addEventListener("input", () => {
      renderDepartments();
    });
  }

  // ---- MERGED BUTTON (single point to show inline panel) ----
  function initMergedButton() {
    mergedBtn.addEventListener("click", (e) => {
      e.preventDefault();
      // if panel is visible we just focus, else show it
      if (inlineFormDiv.style.display === "none" || inlineFormDiv.style.display === "") {
        showAddPanel();
      } else {
        // already visible: bring focus to input
        newDeptInput.focus();
      }
    });
  }

  // ---- panel buttons ----
  function initPanelControls() {
    confirmAddBtn.addEventListener("click", (e) => {
      e.preventDefault();
      handleAddConfirm();
    });

    cancelAddBtn.addEventListener("click", (e) => {
      e.preventDefault();
      hideAddPanel();
      showFeedback("➕ Department addition cancelled", false);
    });

    newDeptInput.addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        handleAddConfirm();
      }
    });
  }

  // optional: escape key closes panel
  function initGlobalEscape() {
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && inlineFormDiv.style.display === "flex") {
        hideAddPanel();
        showFeedback("Closed add panel", false);
      }
    });
  }

  // additional extra: avoid dead clicks, ensure everything reactive
  function refreshInitialState() {
    renderDepartments();
    updateStatsUI();
    // Folders count stays 90, but ensure it's displayed
    foldersCount = 90;
    // documentsCount initially 1, but if files selected it will be updated by file event. Perfect.
    if (fileInputElement.files.length === 0 && documentsCount !== 1) {
      documentsCount = 1;
      updateStatsUI();
    }
    updateStatsUI();
  }

  // Bonus: when add panel is open, clicking outside could close? (optional but not required)
  // but to keep clean we don't overcomplicate, user can press cancel or escape.

  // fix: the merged button has no separate extra text; it's truly merged. all actions work.
  // also provide a demo initial reset for document count based on files.

  // Fix file status on page load: if no files selected documents = 1
  function syncDocumentsDefault() {
    if (fileInputElement.files.length === 0) {
      documentsCount = 1;
      updateStatsUI();
    } else {
      documentsCount = fileInputElement.files.length;
      updateStatsUI();
    }
  }

  // initialize everything
  function initApp() {
    initSearch();
    initMergedButton();
    initPanelControls();
    initGlobalEscape();
    initFileListener();
    refreshInitialState();
    syncDocumentsDefault();
    // additional guard: ensure folder count is always 90 (image spec)
    foldersCount = 90;
    updateStatsUI();
    // make sure dept grid updates on any change
    window.addEventListener("load", () => {
      renderDepartments();
      updateStatsUI();
    });
  }

  // run app
  initApp();
</script>
</body>
</html>
