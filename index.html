<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OARCEL</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* ✅ FIXED ROOT */
:root {
    --bg-gradient: url("https://raw.githubusercontent.com/abjincy-dot/oarcel-pwa/main/images/wallpaper.jpg");
    --glass-bg: rgba(15, 35, 55, 0.75); /* increased for visibility */
    --glass-border: rgba(255, 255, 255, 0.2);
    --text-primary: #ffffff;
    --text-secondary: #cfecff;
    --card-bg: rgba(12, 32, 50, 0.75);
    --input-bg: rgba(0, 0, 0, 0.5);
    --accent-blue: #3b82f6;
    --accent-purple: #7c3aed;
}

/* Light mode */
body.light-mode {
    --bg-gradient: linear-gradient(165deg, #d4e6f1 0%, #b8d4e8 45%, #9bc0d4 100%);
    --glass-bg: rgba(255, 255, 255, 0.85);
    --glass-border: rgba(0, 0, 0, 0.1);
    --text-primary: #1a2a3a;
    --text-secondary: #2c3e50;
    --card-bg: rgba(255, 255, 255, 0.9);
    --input-bg: rgba(255, 255, 255, 0.95);
}

/* ✅ BACKGROUND FIXED */
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;

    background-image: var(--bg-gradient);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    position: relative;
    overflow-x: hidden;
    color: var(--text-primary);
}

/* ✅ DARK OVERLAY (CRITICAL FIX) */
body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.55);
    z-index: 1;
}

/* keep particles behind */
body::before {
    content: '';
    position: fixed;
    top: -20%;
    left: -10%;
    width: 120%;
    height: 70%;
    background: radial-gradient(ellipse at 30% 20%, rgba(255, 210, 140, 0.25) 0%, rgba(255, 160, 80, 0.1) 40%, transparent 70%);
    pointer-events: none;
    z-index: 0;
}

/* ✅ IMPORTANT: UI ABOVE OVERLAY */
.app {
    position: relative;
    z-index: 2;
    max-width: 1200px;
    margin: 0 auto;
    padding: 16px;
}

/* Glass UI */
.header, .stats-bar, .card, .dept-oval, .action-bar, .top-bar, .recent-section, .breadcrumb, .search-container input, .empty-state {
    backdrop-filter: blur(16px);
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 28px;
}

/* Keep rest SAME (no need to touch your logic UI) */

.header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 20px;
    padding: 16px 22px;
}

.logo {
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, #4f9fff, #a855f7);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
}

.header-title h1 { font-size: 1.4rem; font-weight: 700; }
.header-title span { font-size: 0.65rem; color: #9ac4e4; }

.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    gap: 10px;
    flex-wrap: wrap;
    padding: 10px 16px;
    border-radius: 50px;
}

.btn-back, .btn-upload, .theme-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 18px;
    border: none;
    border-radius: 40px;
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    color: var(--text-primary);
}

.btn-back { background: rgba(30, 55, 80, 0.9); }
.btn-upload { background: linear-gradient(135deg, #3b82f6, #7c3aed); color: white; }
.theme-toggle { background: rgba(30, 55, 80, 0.9); }

.search-container input {
    width: 100%;
    padding: 10px 14px;
    border-radius: 40px;
    border: 1px solid var(--glass-border);
    background: var(--input-bg);
    color: var(--text-primary);
    outline: none;
}

/* cards */
.card {
    padding: 12px 16px;
    border-radius: 20px;
    cursor: pointer;
    display: flex;
    gap: 10px;
    border: 1px solid var(--glass-border);
}

.card:hover {
    background: rgba(59, 130, 246, 0.3);
}
</style>
</head>

<body>

<div class="app">
    <div class="header">OARCEL Document Manager</div>

    <div class="card">Your wallpaper background is now working.</div>

    <button onclick="toggleTheme()">Toggle Theme</button>
</div>

<script>
function toggleTheme(){
    document.body.classList.toggle("light-mode");
}
</script>

</body>
</html>
