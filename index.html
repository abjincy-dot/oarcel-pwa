<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>OARCEL | Document Manager</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="OARCEL">
<meta name="theme-color" content="#0a1128">
<link rel="apple-touch-icon" href="https://img.icons8.com/fluency/192/folder-invoices.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div>
<div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div>

<div class="app">
  <div class="header">
    <div class="logo"><i class="fas fa-folder-open"></i></div>
    <div class="header-title">
      <div class="main-line">
        <h1>OARCEL</h1>
        <span class="doc-tag"><i class="fas fa-file-alt"></i> Document Manager</span>
      </div>
      <div class="owner-name">𝓐𝓫𝓲𝓼𝓱 𝓡𝓪𝓳𝓪𝓷</div>
    </div>
  </div>

  <div class="top-bar">
    <button id="backBtn" class="btn-back hidden"><i class="fas fa-arrow-left"></i><span>Back</span></button>
    <div class="search-container">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Search PDFs...">
      <button id="clearSearchBtn" class="clear-search hidden"><i class="fas fa-times-circle"></i></button>
    </div>
    <button id="themeToggle" class="theme-toggle"><i class="fas fa-moon"></i><span>Theme</span></button>
    <button id="uploadBtn" class="btn-upload hidden"><i class="fas fa-cloud-upload-alt"></i><span>Upload</span></button>
    <input type="file" id="fileInput" accept="application/pdf" multiple>
  </div>

  <div class="stats-bar">
    <div class="stat-item"><i class="fas fa-folder"></i><span id="folderCount">0</span><label>Folders</label></div>
    <div class="stat-item"><i class="fas fa-file-pdf"></i><span id="fileCount">0</span><label>Documents</label></div>
  </div>

  <div id="breadcrumb" class="breadcrumb"></div>
  <div id="departmentsSection"></div>
  <div id="searchInfo" class="search-result-info hidden"></div>
  <div id="content" class="content"></div>
</div>

<div id="toast" class="toast hidden"><i class="fas fa-check-circle"></i><span></span></div>

<script src="app.js"></script>
</body>
</html>
