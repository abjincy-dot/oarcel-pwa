<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* Light Mode Variables */
:root {
    --bg-gradient: linear-gradient(165deg, #0a1f3e 0%, #0c2d5e 45%, #14487a 100%);
    --glass-bg: rgba(15, 35, 55, 0.45);
    --glass-border: rgba(255, 255, 255, 0.2);
    --text-primary: #ffffff;
    --text-secondary: #cfecff;
    --card-bg: rgba(12, 32, 50, 0.65);
    --input-bg: rgba(0, 0, 0, 0.4);
}

body.light-mode {
    --bg-gradient: linear-gradient(165deg, #d4e6f1 0%, #b8d4e8 45%, #9bc0d4 100%);
    --glass-bg: rgba(255, 255, 255, 0.7);
    --glass-border: rgba(0, 0, 0, 0.1);
    --text-primary: #1a2a3a;
    --text-secondary: #2c3e50;
    --card-bg: rgba(255, 255, 255, 0.8);
    --input-bg: rgba(255, 255, 255, 0.9);
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    background: var(--bg-gradient);
    position: relative;
    overflow-x: hidden;
    color: var(--text-primary);
    transition: background 0.3s ease;
}

/* Animated light rays */
body::before {
    content: '';
    position: fixed;
    top: -20%;
    left: -10%;
    width: 120%;
    height: 70%;
    background: radial-gradient(ellipse at 30% 20%, rgba(255, 210, 140, 0.25) 0%, rgba(255, 160, 80, 0.1) 40%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    animation: softGlow 12s ease-in-out infinite alternate;
}

@keyframes softGlow {
    0% { opacity: 0.5; transform: scale(1); }
    100% { opacity: 1; transform: scale(1.05); }
}

/* Floating particles */
@keyframes floatUp {
    0% { transform: translateY(0) translateX(0); opacity: 0.2; }
    50% { transform: translateY(-40px) translateX(20px); opacity: 0.6; }
    100% { transform: translateY(-80px) translateX(40px); opacity: 0; }
}

.particle {
    position: fixed;
    background: rgba(255, 255, 245, 0.5);
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
    animation: floatUp 14s infinite ease-out;
}

.particle:nth-child(1) { width: 3px; height: 3px; top: 70%; left: 15%; animation-duration: 18s; }
.particle:nth-child(2) { width: 5px; height: 5px; top: 60%; left: 85%; animation-duration: 22s; animation-delay: 2s; }
.particle:nth-child(3) { width: 2px; height: 2px; top: 50%; left: 45%; animation-duration: 12s; animation-delay: 1s; }
.particle:nth-child(4) { width: 4px; height: 4px; top: 80%; left: 70%; animation-duration: 20s; animation-delay: 4s; }
.particle:nth-child(5) { width: 6px; height: 6px; top: 40%; left: 25%; animation-duration: 16s; animation-delay: 0.5s; }
.particle:nth-child(6) { width: 3px; height: 3px; top: 85%; left: 55%; animation-duration: 24s; animation-delay: 3s; }
.particle:nth-child(7) { width: 5px; height: 5px; top: 30%; left: 92%; animation-duration: 19s; animation-delay: 1.5s; }
.particle:nth-child(8) { width: 2.5px; height: 2.5px; top: 20%; left: 10%; animation-duration: 15s; animation-delay: 2.5s; }

.app {
    position: relative;
    z-index: 2;
    max-width: 1200px;
    margin: 0 auto;
    padding: 16px;
}

/* Glassmorphic elements */
.header, .stats-bar, .card, .dept-oval, .action-bar, .top-bar, .recent-section, .breadcrumb, .search-container input, .empty-state {
    backdrop-filter: blur(16px);
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 28px;
}

.header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 20px;
    padding: 16px 22px;
    backdrop-filter: blur(20px);
    border-radius: 32px;
}

.logo {
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, #4f9fff, #a855f7);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
}

.header-title h1 { font-size: 1.4rem; font-weight: 700; }
.header-title span { font-size: 0.65rem; color: #9ac4e4; }

.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    gap: 10px;
    flex-wrap: wrap;
    background: var(--glass-bg);
    padding: 10px 16px;
    border-radius: 50px;
}

/* Compact buttons for action bar */
.btn-back, .btn-upload, .theme-toggle, .btn-backup, .btn-restore {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 18px;
    border: none;
    border-radius: 40px;
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s ease;
    backdrop-filter: blur(8px);
    color: var(--text-primary);
}

.btn-back { background: rgba(30, 55, 80, 0.8); }
.btn-upload { background: linear-gradient(135deg, #3b82f6, #7c3aed); color: white; }
.theme-toggle { background: rgba(30, 55, 80, 0.8); }
.btn-backup { background: rgba(16, 185, 129, 0.8); color: white; }
.btn-restore { background: rgba(245, 158, 11, 0.8); color: white; }

.search-container {
    flex: 1;
    position: relative;
    min-width: 180px;
}

.search-container i {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: #bbd9ff;
    font-size: 0.9rem;
    z-index: 1;
}

#searchInput {
    width: 100%;
    padding: 10px 14px 10px 40px;
    border-radius: 40px;
    border: 1px solid var(--glass-border);
    background: var(--input-bg);
    backdrop-filter: blur(12px);
    color: var(--text-primary);
    outline: none;
    font-size: 0.85rem;
}

.clear-search {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 1rem;
    z-index: 1;
}

.hidden { display: none !important; }

.stats-bar {
    display: flex;
    gap: 16px;
    margin-bottom: 20px;
    padding: 12px 20px;
    border-radius: 28px;
}

.stat-item {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
}

.stat-item i { font-size: 1.3rem; color: #7ab3ff; }
.stat-item span { font-size: 1.3rem; font-weight: 700; }
.stat-item label { font-size: 0.7rem; color: var(--text-secondary); margin-left: auto; }

/* ACTION BAR - MORE COMPACT */
.action-bar {
    display: flex;
    gap: 10px;
    padding: 12px 16px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 16px;
    background: var(--glass-bg);
    border-radius: 50px;
}

.action-btn {
    background: rgba(20, 45, 65, 0.8);
    border: 1px solid var(--glass-border);
    padding: 8px 18px;
    border-radius: 40px;
    color: var(--text-primary);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 0.8rem;
    font-weight: 500;
    transition: 0.2s;
}

.action-btn i { font-size: 0.85rem; }
.action-btn:hover { transform: translateY(-1px); background: rgba(59,130,246,0.8); }

.departments-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.dept-card { display: flex; align-items: center; gap: 14px; cursor: pointer; padding: 4px 0; }
.dept-card:hover { transform: translateX(5px); }
.dept-oval { padding: 10px 24px; border-radius: 50px; background: linear-gradient(145deg, #2c6285, #1c4468); border: 1px solid rgba(255,255,255,0.25); }
.dept-oval span { font-size: 14px; font-weight: 600; color: white; }
.dept-arrow { color: rgba(100, 180, 250, 0.9); font-size: 14px; }
.dept-info { margin-left: auto; font-size: 11px; background: rgba(0, 0, 0, 0.35); padding: 4px 10px; border-radius: 25px; }

/* Department colors */
.dept-card[data-dept="REMELT"] .dept-oval { background: linear-gradient(145deg, #d45a2b, #a53f15); }
.dept-card[data-dept="CASTER"] .dept-oval { background: linear-gradient(145deg, #1f8a7c, #146b60); }
.dept-card[data-dept="HRM"] .dept-oval { background: linear-gradient(145deg, #6b6bd6, #4a4ab0); }
.dept-card[data-dept="CRM"] .dept-oval { background: linear-gradient(145deg, #e68a2e, #c0681a); }
.dept-card[data-dept="ANNEALING"] .dept-oval { background: linear-gradient(145deg, #c53b6b, #9e2550); }
.dept-card[data-dept="TLL"] .dept-oval { background: linear-gradient(145deg, #1f958b, #147a70); }
.dept-card[data-dept="SLITTER"] .dept-oval { background: linear-gradient(145deg, #3b70e0, #2a53b3); }
.dept-card[data-dept="UTILITY"] .dept-oval { background: linear-gradient(145deg, #cf4a2e, #aa351a); }

.content { display: flex; flex-direction: column; gap: 8px; }

/* CARD - FIXED OVERLAPPING ISSUE */
.card {
    background: var(--card-bg);
    backdrop-filter: blur(14px);
    padding: 12px 16px;
    border-radius: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    border: 1px solid var(--glass-border);
    transition: all 0.2s;
}

.card:hover { background: rgba(59, 130, 246, 0.2); }

.card-icon {
    width: 32px;
    flex-shrink: 0;
}
.card-icon i { font-size: 1.2rem; color: #60a5fa; }

.card-filename {
    flex: 1;
    font-size: 0.85rem;
    font-weight: 500;

}

.card-buttons {
    display: flex;
    gap: 8px;

}

.card-buttons button {

    border-radius: 25px;
    font-size: 0.7rem;
    cursor: pointer;
    display: inline-flex;

    gap: 5px;
    font-weight: 500;

    border: none;
}

.rename-file-btn {
    background: rgba(59, 130, 246, 0.3);
    border: 1px solid rgba(59, 130, 246, 0.5);
    color: #bfdbfe;
}

.delete-btn {
    background: rgba(239, 68, 68, 0.3);
    border: 1px solid rgba(239, 68, 68, 0.5);
    color: #fecaca;
}

.toast {
    position: fixed;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    background: #10b981;
    color: #fff;
    padding: 10px 20px;
    border-radius: 40px;
    z-index: 1100;
    backdrop-filter: blur(12px);
    font-size: 0.85rem;
}

.empty-state { text-align: center; padding: 40px 20px; background: var(--card-bg); border-radius: 28px; }
.empty-state i { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.7; }
.empty-state p { font-size: 0.9rem; }

.breadcrumb {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    padding: 10px 16px;
    background: rgba(0, 0, 0, 0.35);
    border-radius: 40px;
    width: fit-content;
}

.breadcrumb-item {
    color: #cae3ff;
    cursor: pointer;
    font-size: 0.8rem;
    padding: 4px 8px;
    border-radius: 25px;
}

.recent-section {
    margin-bottom: 16px;
    padding: 12px 16px;
    border-radius: 24px;
}

.recent-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.recent-title { font-size: 0.8rem; display: flex; align-items: center; gap: 6px; font-weight: 600; }
.clear-recent { background: rgba(239, 68, 68, 0.25); border: 1px solid rgba(239, 68, 68, 0.4); color: #fca5a5; padding: 4px 10px; border-radius: 25px; cursor: pointer; font-size: 0.65rem; }
.recent-list { display: flex; gap: 8px; flex-wrap: wrap; }
.recent-item { background: rgba(59, 130, 246, 0.25); padding: 5px 12px; border-radius: 25px; font-size: 0.75rem; cursor: pointer; }

.section-title { font-size: 0.9rem; font-weight: 600; margin: 0 0 12px 0; display: flex; align-items: center; gap: 8px; }
#fileInput, #restoreInput { display: none; }

.search-result-info {
    margin: 8px 0;
    padding: 6px 12px;
    font-size: 0.8rem;
    background: var(--glass-bg);
    border-radius: 20px;
    display: inline-block;
}

/* PDF Viewer with zoom support - OPTIMIZED FOR NO CRASHING */
.pdf-viewer-modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 2000;
    background: #1a1a1a;
}

.pdf-viewer-modal.hidden {
    display: none;
}

.pdf-viewer-container {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    background: #1a1a1a;
    overflow: hidden;
}

.pdf-canvas-wrapper {
    flex: 1;
    overflow: auto;
    -webkit-overflow-scrolling: touch;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    background: #525659;
}

#pdfCanvas {
    display: block;
    margin: 0 auto;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    background: white;
    max-width: 100%;
    height: auto;
}

/* Memory optimization for mobile */
@media (max-width: 768px) {
    .pdf-canvas-wrapper {
        overflow: auto;
        -webkit-overflow-scrolling: touch;
    }
    
    #pdfCanvas {
        max-width: 200%;
        max-height: 200%;
    }
}

.pdf-zoom-controls {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 12px 20px;
    background: rgba(0,0,0,0.9);
    border-top: 1px solid rgba(255,255,255,0.1);
    position: sticky;
    bottom: 0;
    z-index: 10;
}

.zoom-btn {
    background: rgba(255,255,255,0.15);
    border: none;
    color: white;
    padding: 12px 24px;
    border-radius: 40px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    touch-action: manipulation;
    min-width: 80px;
    justify-content: center;
}

.zoom-btn:active {
    transform: scale(0.96);
    background: #6366f1;
}

.zoom-level {
    color: white;
    font-size: 14px;
    background: rgba(0,0,0,0.5);
    padding: 8px 16px;
    border-radius: 30px;
    font-weight: 500;
}

/* Mobile zoom hint */
.zoom-hint {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 8px 16px;
    border-radius: 30px;
    font-size: 12px;
    pointer-events: none;
    z-index: 20;
    white-space: nowrap;
    backdrop-filter: blur(10px);
    animation: fadeOut 3s forwards;
}

@keyframes fadeOut {
    0% { opacity: 1; }
    70% { opacity: 1; }
    100% { opacity: 0; visibility: hidden; }
}

/* Mobile adjustments */
@media (max-width: 640px) {
    .app { padding: 12px; }
    .btn-back span, .btn-upload span, .theme-toggle span, .btn-backup span, .btn-restore span { display: none; }
    .btn-back, .btn-upload, .theme-toggle, .btn-backup, .btn-restore { padding: 10px 14px; }
    .action-btn { padding: 6px 14px; font-size: 0.75rem; }
    .action-btn i { font-size: 0.75rem; }
    .card { padding: 10px 12px; }
    .card-filename { font-size: 0.8rem; }
    .card-buttons button { padding: 4px 10px; font-size: 0.65rem; }
    .dept-oval { padding: 8px 18px; }
    .dept-oval span { font-size: 12px; }
    .stat-item span { font-size: 1.1rem; }
    .stat-item i { font-size: 1.1rem; }
    .zoom-btn { padding: 8px 16px; font-size: 14px; min-width: 60px; }
}
</style>

<div class="app">
  <div class="header">
    <div class="logo"><i class="fas fa-folder-open"></i></div>
    <div class="header-title"><h1>OARCEL</h1><span>Document Manager</span></div>
  </div>

  <div class="top-bar">
    <button id="backBtn" class="btn-back hidden" onclick="goBack()"><i class="fas fa-arrow-left"></i><span>Back</span></button>
    <div class="search-container">
      <i class="fas fa-search"></i>

    <div class="stat-item"><i class="fas fa-folder"></i><span id="folderCount">0</span><label>Folders</label></div>
    <div class="stat-item"><i class="fas fa-file-pdf"></i><span id="fileCount">0</span><label>Documents</label></div>

  </div>

  <div id="departmentsSection"></div>
  <div id="recentSection" class="recent-section hidden">
    <div class="recent-header"><div class="recent-title"><i class="fas fa-history"></i> Recently Viewed</div><button class="clear-recent" onclick="clearAllRecent()"><i class="fas fa-trash-alt"></i> Clear</button></div>
    <div id="recentList" class="recent-list"></div>

      <canvas id="pdfCanvas"></canvas>

      <button class="zoom-btn" id="zoomOutBtn"><i class="fas fa-search-minus"></i> -</button>

      <button class="zoom-btn" id="zoomInBtn"><i class="fas fa-search-plus"></i> +</button>
      <button class="zoom-btn" id="closePdfBtn"><i class="fas fa-times"></i> Close</button>
    </div>
  </div>
</div>

<div id="toast" class="toast hidden"><i class="fas fa-check-circle"></i><span></span></div>

<script>
// ==================== INDEXEDDB STORAGE ====================
const DB_NAME = 'OarcelDB';
const DB_VERSION = 2;
let db = null;
let allFiles = {};
let fileSystem = {};
let recentFiles = [];
let currentPath = [];
let isSearchMode = false;

// PDF Viewer variables - OPTIMIZED
let pdfDoc = null;
let currentPage = 1;
let currentScale = 1.0;
let pdfCanvas = null;
let ctx = null;
let renderTask = null;
let zoomTimeout = null;

// Initialize IndexedDB
function initDB() {
    return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onerror = () => reject(request.error);
        request.onsuccess = () => {
            db = request.result;
            resolve();
        };
        request.onupgradeneeded = (event) => {
            const db = event.target.result;
            if (!db.objectStoreNames.contains('files')) db.createObjectStore('files', { keyPath: 'id' });
            if (!db.objectStoreNames.contains('folderStructure')) db.createObjectStore('folderStructure', { keyPath: 'key' });
            if (!db.objectStoreNames.contains('recent')) db.createObjectStore('recent', { keyPath: 'id' });
        };
    });
}

// Convert dataURL to Blob
function dataURLToBlob(dataUrl) {
    const arr = dataUrl.split(',');
    const mime = arr[0].match(/:(.*?);/)[1];
    const bstr = atob(arr[1]);
    let n = bstr.length;
    const u8arr = new Uint8Array(n);
    while (n--) u8arr[n] = bstr.charCodeAt(n);
    return new Blob([u8arr], { type: mime });
}

// ============ OPTIMIZED PDF VIEWER (NO CRASHING) ============
async function openPDF(dataUrl, fileName) {
    try {
        const folderPath = currentPath.join("/");
        addToRecent(fileName, folderPath, dataUrl);
        
        const modal = document.getElementById('pdfViewerModal');
        if (!modal) {
            window.open(dataUrl, '_blank');
            showToast(`Opening ${fileName}...`);
            return;
        }
        
        modal.classList.remove('hidden');
        pdfCanvas = document.getElementById('pdfCanvas');
        ctx = pdfCanvas.getContext('2d');
        
        showToast(`Loading ${fileName}...`);
        
        // Clean up previous PDF document
        if (pdfDoc) {
            pdfDoc.destroy();
            pdfDoc = null;
        }
        
        const loadingTask = pdfjsLib.getDocument(dataUrl);
        pdfDoc = await loadingTask.promise;
        currentPage = 1;
        currentScale = 1.0;
        
        await renderPageOptimized(currentPage);
        updateZoomDisplay();
        showZoomHint();
        showToast(`Loaded: ${fileName}`);
        
        // Warn if PDF has many pages
        if (pdfDoc.numPages > 50) {
            showToast(`Large PDF (${pdfDoc.numPages} pages). Zoom carefully.`, true);
        }
        
    } catch (err) {
        console.error('Error opening PDF:', err);
        showToast('Failed to open PDF', true);
        try {
            window.open(dataUrl, '_blank');
        } catch (e) {
            showToast('Cannot open PDF', true);
        }
    }
}

async function renderPageOptimized(pageNum) {
    if (!pdfDoc) return;
    
    // Cancel any ongoing render to prevent memory buildup
    if (renderTask) {
        renderTask.cancel();
        renderTask = null;
    }
    
    try {
        const page = await pdfDoc.getPage(pageNum);
        
        // Calculate optimal scale - limit to 2.0x max for stability
        let optimizedScale = Math.min(currentScale, 2.0);
        
        const viewport = page.getViewport({ scale: optimizedScale });
        
        // Set canvas dimensions
        pdfCanvas.width = viewport.width;
        pdfCanvas.height = viewport.height;
        pdfCanvas.style.width = `${viewport.width}px`;
        pdfCanvas.style.height = `${viewport.height}px`;
        
        // Clear canvas before rendering new content
        ctx.clearRect(0, 0, pdfCanvas.width, pdfCanvas.height);
        
        const renderContext = {
            canvasContext: ctx,
            viewport: viewport,
            enableWebGL: false,
            renderInteractiveForms: false,
        };
        
        renderTask = page.render(renderContext);
        await renderTask.promise;
        renderTask = null;
        
    } catch (err) {
        if (err.name === 'RenderingCancelledException') {
            console.log('Rendering cancelled');
        } else {
            console.error('Render error:', err);
        }
    }
}

function zoomIn() {
    if (!pdfDoc) return;
    // Limit max zoom to 2.0x to prevent crashes
    if (currentScale < 2.0) {
        currentScale = Math.min(2.0, currentScale + 0.25);
        
        // Debounce zoom to prevent rapid re-renders
        if (zoomTimeout) clearTimeout(zoomTimeout);
        zoomTimeout = setTimeout(() => {
            renderPageOptimized(currentPage);
            updateZoomDisplay();
        }, 50);
    } else {
        showToast('Maximum zoom reached (200%)', true);
    }
}

function zoomOut() {
    if (!pdfDoc) return;
    if (currentScale > 0.5) {
        currentScale = Math.max(0.5, currentScale - 0.25);
        
        if (zoomTimeout) clearTimeout(zoomTimeout);
        zoomTimeout = setTimeout(() => {
            renderPageOptimized(currentPage);
            updateZoomDisplay();
        }, 50);
    }
}

function updateZoomDisplay() {
    const zoomLevel = document.getElementById('zoomLevel');
    if (zoomLevel) {
        let displayPercent = Math.round(currentScale * 100);
        if (displayPercent > 200) displayPercent = 200;
        zoomLevel.textContent = `${displayPercent}%`;
    }
}

function closePDFViewer() {
    const modal = document.getElementById('pdfViewerModal');
    if (modal) {
        modal.classList.add('hidden');
    }
    
    // Clean up properly
    if (pdfDoc) {
        pdfDoc.destroy();
        pdfDoc = null;
    }
    
    if (renderTask) {
        renderTask.cancel();
        renderTask = null;
    }
    
    // Clear canvas
    if (pdfCanvas && ctx) {
        ctx.clearRect(0, 0, pdfCanvas.width, pdfCanvas.height);
        pdfCanvas.width = 0;
        pdfCanvas.height = 0;
    }
    
    if (zoomTimeout) {
        clearTimeout(zoomTimeout);
        zoomTimeout = null;
    }
}

function showZoomHint() {
    const existingHint = document.querySelector('.zoom-hint');
    if (existingHint) existingHint.remove();
    
    const hint = document.createElement('div');
    hint.className = 'zoom-hint';
    hint.innerHTML = '<i class="fas fa-hand-peace"></i> Pinch or use buttons to zoom (max 200%)';
    document.querySelector('.pdf-viewer-container').appendChild(hint);
    
    setTimeout(() => {
        if (hint) hint.remove();
    }, 3000);
}

// Setup pinch-to-zoom for mobile with 2.0x limit
function setupPinchZoom() {
    let initialDistance = 0;
    let initialScale = 1;
    
    const wrapper = document.getElementById('pdfCanvasWrapper');
    if (!wrapper) return;
    
    wrapper.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) {
            e.preventDefault();
            initialDistance = Math.hypot(
                e.touches[0].pageX - e.touches[1].pageX,
                e.touches[0].pageY - e.touches[1].pageY
            );
            initialScale = currentScale;
        }
    });
    
    wrapper.addEventListener('touchmove', (e) => {
        if (e.touches.length === 2 && initialDistance > 0) {
            e.preventDefault();
            const currentDistance = Math.hypot(
                e.touches[0].pageX - e.touches[1].pageX,
                e.touches[0].pageY - e.touches[1].pageY
            );
            let scale = (currentDistance / initialDistance) * initialScale;
            // Limit zoom to between 0.5 and 2.0
            currentScale = Math.min(2.0, Math.max(0.5, scale));
            renderPageOptimized(currentPage);
            updateZoomDisplay();
        }
    });
    
    wrapper.addEventListener('touchend', () => {
        initialDistance = 0;
    });
}
