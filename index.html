<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>OARCEL | Document Manager</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
</script>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
    background-attachment: fixed;
    color: #fff;
}

/* Glass container */
.container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px 32px;
}

/* Header */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
    flex-wrap: wrap;
    gap: 20px;
}

.logo h1 {
    font-size: 1.8rem;
    font-weight: 700;
    background: linear-gradient(135deg, #fff, #e0d4ff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

.logo p {
    font-size: 0.8rem;
    opacity: 0.8;
}

.header-right {
    display: flex;
    gap: 16px;
    align-items: center;
}

.notification-icon, .profile-icon {
    width: 40px;
    height: 40px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    backdrop-filter: blur(10px);
}

/* Stats Cards */
.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 24px;
    margin-bottom: 32px;
}

.stat-card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border-radius: 24px;
    padding: 24px;
    border: 1px solid rgba(255,255,255,0.2);
    transition: transform 0.3s ease;
}

.stat-card:hover {
    transform: translateY(-5px);
}

.stat-card h3 {
    font-size: 0.9rem;
    font-weight: 500;
    opacity: 0.8;
    margin-bottom: 12px;
}

.stat-number {
    font-size: 2.5rem;
    font-weight: 700;
    margin-bottom: 8px;
}

.stat-change {
    font-size: 0.8rem;
    opacity: 0.7;
}

/* Breadcrumb */
.breadcrumb {
    margin-bottom: 24px;
    font-size: 0.9rem;
    opacity: 0.8;
}

.breadcrumb span {
    cursor: pointer;
}

.breadcrumb span:hover {
    opacity: 1;
    text-decoration: underline;
}

/* Department Header */
.department-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 16px;
}

.department-header h2 {
    font-size: 1.5rem;
    font-weight: 600;
}

.header-actions {
    display: flex;
    gap: 12px;
}

.action-btn {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 8px 20px;
    border-radius: 40px;
    color: white;
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 8px;
}

.action-btn:hover {
    background: rgba(255,255,255,0.25);
    transform: translateY(-2px);
}

/* Search and Filter Bar */
.search-filter-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 16px;
}

.search-box {
    display: flex;
    align-items: center;
    background: rgba(255,255,255,0.15);
    border-radius: 40px;
    padding: 8px 20px;
    flex: 1;
    max-width: 400px;
}

.search-box i {
    margin-right: 12px;
    opacity: 0.7;
}

.search-box input {
    background: transparent;
    border: none;
    outline: none;
    color: white;
    width: 100%;
    font-size: 0.9rem;
}

.search-box input::placeholder {
    color: rgba(255,255,255,0.6);
}

.filter-buttons {
    display: flex;
    gap: 12px;
}

.filter-btn {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 8px 20px;
    border-radius: 40px;
    color: white;
    cursor: pointer;
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    gap: 8px;
}

.filter-btn.active {
    background: rgba(255,255,255,0.3);
    border-color: rgba(255,255,255,0.5);
}

/* Departments Grid */
.departments-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
}

.department-card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 20px;
    border: 1px solid rgba(255,255,255,0.15);
    cursor: pointer;
    transition: all 0.3s ease;
}

.department-card:hover {
    background: rgba(255,255,255,0.15);
    transform: translateY(-3px);
    border-color: rgba(255,255,255,0.3);
}

.card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
}

.dept-icon {
    width: 48px;
    height: 48px;
    background: rgba(255,255,255,0.2);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
}

.dept-menu {
    opacity: 0.6;
    cursor: pointer;
}

.dept-menu:hover {
    opacity: 1;
}

.card-body h3 {
    font-size: 1.2rem;
    font-weight: 600;
    margin-bottom: 8px;
}

.card-body p {
    font-size: 0.8rem;
    opacity: 0.7;
    margin-bottom: 16px;
}

.card-stats {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 16px;
    border-top: 1px solid rgba(255,255,255,0.1);
}

.stat {
    font-size: 0.8rem;
    opacity: 0.8;
}

.stat i {
    margin-right: 6px;
}

.view-link {
    color: #fff;
    text-decoration: none;
    font-size: 0.8rem;
    opacity: 0.8;
}

.view-link:hover {
    opacity: 1;
}

/* Responsive */
@media (max-width: 768px) {
    .container {
        padding: 16px;
    }
    
    .stats-grid {
        grid-template-columns: 1fr;
    }
    
    .departments-grid {
        grid-template-columns: 1fr;
    }
    
    .search-filter-bar {
        flex-direction: column;
        align-items: stretch;
    }
    
    .search-box {
        max-width: 100%;
    }
    
    .filter-buttons {
        justify-content: center;
    }
    
    .header {
        flex-direction: column;
        text-align: center;
    }
}
</style>
</head>
<body>
<div class="container">
    <!-- Header -->
    <div class="header">
        <div class="logo">
            <h1>OARCEL</h1>
            <p>Document Manager</p>
        </div>
        <div class="header-right">
            <div class="notification-icon">
                <i class="fas fa-bell"></i>
            </div>
            <div class="profile-icon">
                <i class="fas fa-user"></i>
            </div>
        </div>
    </div>

    <!-- Stats Cards -->
    <div class="stats-grid">
        <div class="stat-card">
            <h3>Total Documents</h3>
            <div class="stat-number">1,336</div>
            <div class="stat-change">↑ 12% from last month</div>
        </div>
        <div class="stat-card">
            <h3>Active Users</h3>
            <div class="stat-number">102k</div>
            <div class="stat-change">↑ 8% from last month</div>
        </div>
        <div class="stat-card">
            <h3>Storage Used</h3>
            <div class="stat-number">160 GB</div>
            <div class="stat-change">of 500 GB</div>
        </div>
    </div>

    <!-- Breadcrumb -->
    <div class="breadcrumb">
        <span>Home</span> &gt; <span>Document Manager</span>
    </div>

    <!-- Department Header -->
    <div class="department-header">
        <h2>Departments</h2>
        <div class="header-actions">
            <button class="action-btn" onclick="addNewDepartment()"><i class="fas fa-plus"></i> Add Department</button>
            <button class="action-btn"><i class="fas fa-download"></i> Export</button>
        </div>
    </div>

    <!-- Search and Filter Bar -->
    <div class="search-filter-bar">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search departments...">
        </div>
        <div class="filter-buttons">
            <button class="filter-btn active"><i class="fas fa-th-large"></i> All</button>
            <button class="filter-btn"><i class="fas fa-star"></i> Favorites</button>
            <button class="filter-btn"><i class="fas fa-chart-line"></i> Trending</button>
        </div>
    </div>

    <!-- Departments Grid -->
    <div id="departmentsGrid" class="departments-grid">
        <!-- Departments will be dynamically loaded here -->
    </div>
</div>

<script>
// Department data
const departments = [
    { name: "REMELT", icon: "fas fa-fire", items: 26, color: "#d45a2b", description: "Metal remelting and processing" },
    { name: "CASTER", icon: "fas fa-industry", items: 8, color: "#1f8a7c", description: "Casting operations" },
    { name: "HRM", icon: "fas fa-users", items: 8, color: "#6b6bd6", description: "Human resource management" },
    { name: "CRM", icon: "fas fa-chart-line", items: 8, color: "#e68a2e", description: "Customer relationship management" },
    { name: "ANNEALING", icon: "fas fa-temperature-high", items: 8, color: "#c53b6b", description: "Heat treatment process" },
    { name: "TLL", icon: "fas fa-microchip", items: 8, color: "#1f958b", description: "Technology and logistics" },
    { name: "SLITTER", icon: "fas fa-cut", items: 8, color: "#3b70e0", description: "Slitting operations" },
    { name: "UTILITY", icon: "fas fa-bolt", items: 8, color: "#cf4a2e", description: "Utility services" }
];

let searchTerm = '';

// Render departments
function renderDepartments() {
    const grid = document.getElementById('departmentsGrid');
    const filtered = departments.filter(dept => 
        dept.name.toLowerCase().includes(searchTerm.toLowerCase())
    );
    
    if (filtered.length === 0) {
        grid.innerHTML = '<div style="text-align: center; padding: 60px; background: rgba(255,255,255,0.1); border-radius: 20px;">No departments found</div>';
        return;
    }
    
    grid.innerHTML = filtered.map(dept => `
        <div class="department-card" onclick="selectDepartment('${dept.name}')">
            <div class="card-header">
                <div class="dept-icon" style="background: ${dept.color}40;">
                    <i class="${dept.icon}" style="color: ${dept.color};"></i>
                </div>
                <div class="dept-menu">
                    <i class="fas fa-ellipsis-v"></i>
                </div>
            </div>
            <div class="card-body">
                <h3>${dept.name}</h3>
                <p>${dept.description}</p>
            </div>
            <div class="card-stats">
                <div class="stat">
                    <i class="fas fa-file-pdf"></i> ${dept.items} documents
                </div>
                <div class="view-link">
                    View Details <i class="fas fa-arrow-right"></i>
                </div>
            </div>
        </div>
    `).join('');
}

// Select department - opens PDF viewer for that department
function selectDepartment(deptName) {
    alert(`Opening ${deptName} department documents. This would show all PDF files for ${deptName}.`);
    // In a full implementation, this would load PDFs for the selected department
}

// Add new department
function addNewDepartment() {
    const name = prompt("Enter new department name:");
    if (name && name.trim()) {
        const newDept = {
            name: name.toUpperCase(),
            icon: "fas fa-folder",
            items: 0,
            color: "#888888",
            description: "New department"
        };
        departments.push(newDept);
        renderDepartments();
        alert(`Department "${name}" added successfully!`);
    }
}

// Search functionality
document.getElementById('searchInput').addEventListener('input', (e) => {
    searchTerm = e.target.value;
    renderDepartments();
});

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        // Apply filter logic here if needed
    });
});

// Initialize
renderDepartments();
</script>
</body>
</html>
