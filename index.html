<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>OARCEL | Document Manager (3D Enhanced)</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="OARCEL">
<meta name="theme-color" content="#0a1128">
<link rel="apple-touch-icon" href="https://img.icons8.com/fluency/192/folder-invoices.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ============================================
   OARCEL Document Manager — 3D Premium Edition
   ============================================ */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --bg-deep: #070d1a;
    --bg-gradient: url("https://raw.githubusercontent.com/abjincy-dot/oarcel-pwa/main/images/wallpaper.jpg");
    
    --glass-bg: rgba(15, 30, 50, 0.55);
    --glass-bg-hover: rgba(20, 45, 75, 0.7);
    --glass-border: rgba(255, 255, 255, 0.12);
    --glass-border-hover: rgba(255, 255, 255, 0.22);
    --glass-highlight: rgba(255, 255, 255, 0.05);
    
    --text-primary: #f0f4f8;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    
    --accent-blue: #3b82f6;
    --accent-purple: #8b5cf6;
    --accent-cyan: #06b6d4;
    --accent-rose: #f43f5e;
    --accent-emerald: #10b981;
    
    --card-bg: rgba(12, 28, 48, 0.6);
    --card-bg-hover: rgba(18, 40, 68, 0.75);
    --input-bg: rgba(0, 0, 0, 0.35);
    
    --shadow-sm: 0 2px 8px rgba(0,0,0,0.2);
    --shadow-md: 0 4px 20px rgba(0,0,0,0.3);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.4);
    --shadow-glow: 0 0 40px rgba(59,130,246,0.15);
    
    --radius-sm: 12px;
    --radius-md: 16px;
    --radius-lg: 24px;
    --radius-xl: 32px;
    --radius-full: 9999px;
    
    --transition-fast: 0.15s cubic-bezier(0.4,0,0.2,1);
    --transition-base: 0.25s cubic-bezier(0.4,0,0.2,1);
    --transition-slow: 0.4s cubic-bezier(0.4,0,0.2,1);
}

body.light-mode {
    --bg-deep: #f1f5f9;
    --bg-gradient: linear-gradient(165deg, #e2e8f0 0%, #cbd5e1 45%, #b8c5d6 100%);
    --glass-bg: rgba(255,255,255,0.72);
    --glass-bg-hover: rgba(255,255,255,0.85);
    --glass-border: rgba(0,0,0,0.08);
    --glass-border-hover: rgba(0,0,0,0.15);
    --glass-highlight: rgba(255,255,255,0.5);
    --text-primary: #0f172a;
    --text-secondary: #475569;
    --text-muted: #94a3b8;
    --card-bg: rgba(255,255,255,0.75);
    --card-bg-hover: rgba(255,255,255,0.9);
    --input-bg: rgba(255,255,255,0.85);
    --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 20px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.1);
    --shadow-glow: 0 0 40px rgba(59,130,246,0.1);
}

body {
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    background: var(--bg-deep);
    color: var(--text-primary);
    overflow-x: hidden;
    line-height: 1.5;
    transition: background 0.3s ease, color 0.2s ease;
}
body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: var(--bg-gradient);
    background-size: cover;
    background-position: center;
    z-index: -3;
}
.ambient-glow {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: -2;
    opacity: 0.4;
    animation: ambientFloat 20s ease-in-out infinite alternate;
    transition: transform 0.2s ease-out;
}
.glow-1 { width: 500px; height: 500px; top: -10%; left: -5%; background: radial-gradient(circle, rgba(59,130,246,0.25), transparent 70%); animation-duration: 18s; }
.glow-2 { width: 400px; height: 400px; bottom: -5%; right: -5%; background: radial-gradient(circle, rgba(139,92,246,0.2), transparent 70%); animation-duration: 22s; animation-delay: -5s; }
@keyframes ambientFloat {
    0% { transform: translate(0,0) scale(1); opacity: 0.3; }
    50% { transform: translate(30px,-20px) scale(1.1); opacity: 0.5; }
    100% { transform: translate(-20px,15px) scale(0.95); opacity: 0.35; }
}
.particles-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
}
.particle {
    position: absolute;
    background: rgba(255,255,255,0.4);
    border-radius: 50%;
    pointer-events: none;
    animation: floatUp linear infinite;
}
.particle:nth-child(1) { width:3px; height:3px; top:90%; left:10%; animation-duration:16s; }
.particle:nth-child(2) { width:4px; height:4px; top:85%; left:30%; animation-duration:20s; animation-delay:2s; }
.particle:nth-child(3) { width:2px; height:2px; top:95%; left:50%; animation-duration:14s; animation-delay:1s; }
.particle:nth-child(4) { width:5px; height:5px; top:88%; left:70%; animation-duration:18s; animation-delay:3s; }
.particle:nth-child(5) { width:3px; height:3px; top:92%; left:85%; animation-duration:22s; animation-delay:0.5s; }
.particle:nth-child(6) { width:4px; height:4px; top:80%; left:20%; animation-duration:15s; animation-delay:4s; }
.particle:nth-child(7) { width:2px; height:2px; top:87%; left:60%; animation-duration:19s; animation-delay:1.5s; }
.particle:nth-child(8) { width:3px; height:3px; top:93%; left:40%; animation-duration:17s; animation-delay:2.5s; }
.particle:nth-child(9) { width:5px; height:5px; top:82%; left:75%; animation-duration:21s; animation-delay:3.5s; }
.particle:nth-child(10) { width:2px; height:2px; top:96%; left:15%; animation-duration:13s; animation-delay:5s; }
.particle:nth-child(11) { width:4px; height:4px; top:89%; left:55%; animation-duration:16s; animation-delay:2s; }
.particle:nth-child(12) { width:3px; height:3px; top:91%; left:90%; animation-duration:20s; animation-delay:4s; }
@keyframes floatUp {
    0% { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
    10% { opacity: 0.6; }
    50% { transform: translateY(-50vh) translateX(30px) scale(1.2); opacity: 0.4; }
    90% { opacity: 0.1; }
    100% { transform: translateY(-100vh) translateX(60px) scale(0.5); opacity: 0; }
}
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
::-webkit-scrollbar-thumb { background: var(--accent-blue); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent-purple); }

.app {
    position: relative;
    z-index: 2;
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 20px 40px;
    animation: fadeInUp 0.6s ease-out;
}
@keyframes fadeInUp {
    from { opacity:0; transform:translateY(20px); }
    to { opacity:1; transform:translateY(0); }
}

/* Header */
.header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
    padding: 18px 24px;
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-md);
}
.logo {
    position: relative;
    width: 52px;
    height: 52px;
    flex-shrink: 0;
}
.logo-inner {
    width:100%; height:100%;
    background: linear-gradient(135deg,#3b82f6,#8b5cf6,#06b6d4);
    background-size:200% 200%;
    border-radius: var(--radius-md);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size:1.5rem;
    color:white;
    animation: gradientShift 6s ease infinite;
    box-shadow:0 4px 15px rgba(59,130,246,0.4);
}
@keyframes gradientShift {
    0%,100% { background-position:0% 50%; }
    50% { background-position:100% 50%; }
}
.logo-ring {
    position: absolute;
    inset: -4px;
    border-radius: calc(var(--radius-md)+4px);
    border:2px solid transparent;
    background: linear-gradient(135deg,rgba(59,130,246,0.5),rgba(139,92,246,0.5)) border-box;
    mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
    mask-composite: exclude;
    animation: ringPulse 3s ease-in-out infinite;
}
@keyframes ringPulse {
    0%,100% { opacity:0.6; transform:scale(1); }
    50% { opacity:1; transform:scale(1.02); }
}
.header-title {
    display: flex;
    flex-direction: column;
    gap:6px;
    flex:1;
}
.main-line {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap:10px;
}
.header-title h1 {
    font-size:1.6rem;
    font-weight:800;
    background: linear-gradient(135deg,#fff 0%,#bfdbfe 50%,#a5f3fc 100%);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
}
body.light-mode .header-title h1 {
    background: linear-gradient(135deg,#0f172a 0%,#1e40af 50%,#7c3aed 100%);
    -webkit-background-clip:text;
    background-clip:text;
}
.doc-tag {
    font-size:0.7rem;
    font-weight:600;
    color:var(--accent-cyan);
    background:rgba(6,182,212,0.12);
    padding:4px 10px;
    border-radius:var(--radius-full);
    display: inline-flex;
    align-items:center;
    gap:5px;
}
.owner-name {
    display:flex;
    align-items:center;
    gap:8px;
    font-size:0.8rem;
    color:var(--text-secondary);
}
.owner-dot {
    width:8px; height:8px;
    background:var(--accent-emerald);
    border-radius:50%;
    box-shadow:0 0 8px var(--accent-emerald);
    animation:dotPulse 2s ease-in-out infinite;
}
@keyframes dotPulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:0.6; transform:scale(0.85); }
}

/* Top Bar */
.top-bar {
    display: flex;
    align-items: center;
    gap:12px;
    margin-bottom:20px;
    padding:10px;
    background: var(--glass-bg);
    backdrop-filter: blur(16px);
    border:1px solid var(--glass-border);
    border-radius: var(--radius-full);
    flex-wrap: wrap;
}
.search-container {
    flex:1;
    position: relative;
    min-width:180px;
}
.search-container i {
    position: absolute;
    left:16px;
    top:50%;
    transform:translateY(-50%);
    color:var(--text-muted);
}
#searchInput {
    width:100%;
    padding:12px 40px 12px 44px;
    border-radius: var(--radius-full);
    border:1px solid var(--glass-border);
    background: var(--input-bg);
    color:var(--text-primary);
    outline:none;
    font-family:inherit;
}
.clear-search {
    position: absolute;
    right:12px;
    top:50%;
    transform:translateY(-50%);
    background:rgba(255,255,255,0.1);
    border:none;
    color:var(--text-muted);
    cursor:pointer;
    border-radius:50%;
    width:24px; height:24px;
}
.top-bar-actions {
    display: flex;
    gap:10px;
}
.btn-back {
    display: flex;
    align-items:center;
    gap:8px;
    padding:10px 20px;
    border-radius: var(--radius-full);
    font-weight:600;
    background: linear-gradient(135deg,rgba(59,130,246,0.15),rgba(139,92,246,0.15));
    border:1px solid rgba(59,130,246,0.3);
    color:var(--text-primary);
    cursor:pointer;
    transition: var(--transition-base);
}
.btn-back:hover {
    transform: translateX(-3px);
    box-shadow:0 4px 15px rgba(59,130,246,0.2);
}
.theme-toggle {
    width:42px; height:42px;
    border-radius:50%;
    background: linear-gradient(135deg,rgba(168,85,247,0.15),rgba(236,72,153,0.15));
    border:1px solid rgba(168,85,247,0.3);
    color:var(--text-primary);
    cursor:pointer;
    transition: var(--transition-base);
}
.theme-toggle:hover {
    transform: scale(1.08) rotate(5deg);
}
.btn-upload {
    display: flex;
    align-items:center;
    gap:8px;
    padding:12px 22px;
    border-radius: var(--radius-full);
    font-weight:600;
    background: linear-gradient(135deg,#3b82f6,#7c3aed);
    color:white;
    cursor:pointer;
    border:none;
}
.btn-upload:hover {
    transform: translateY(-2px);
    box-shadow:0 6px 25px rgba(59,130,246,0.45);
}
#fileInput { display:none; }

/* Stats Bar */
.stats-bar {
    display: flex;
    align-items:center;
    gap:16px;
    margin-bottom:20px;
    padding:14px 24px;
    background: var(--glass-bg);
    backdrop-filter: blur(16px);
    border-radius: var(--radius-lg);
}
.stat-item {
    display: flex;
    align-items:center;
    gap:14px;
    flex:1;
    transition: transform 0.2s;
}
.stat-item:hover {
    transform: translateY(-2px);
}
.stat-icon-bg {
    width:44px; height:44px;
    border-radius: var(--radius-md);
    background: linear-gradient(135deg,rgba(59,130,246,0.2),rgba(59,130,246,0.05));
    display: flex;
    align-items:center;
    justify-content:center;
    color:var(--accent-blue);
}
.stat-number {
    font-size:1.4rem;
    font-weight:800;
}
.stat-data label {
    font-size:0.7rem;
    text-transform: uppercase;
}
.stat-divider {
    width:1px;
    height:32px;
    background: var(--glass-border);
}

/* Breadcrumb */
.breadcrumb {
    display: flex;
    align-items:center;
    gap:4px;
    flex-wrap:wrap;
    margin-bottom:20px;
    padding:8px 16px;
    background: rgba(0,0,0,0.25);
    border-radius: var(--radius-full);
    width: fit-content;
}
.breadcrumb-item {
    color:var(--text-secondary);
    cursor:pointer;
    padding:6px 12px;
    border-radius: var(--radius-full);
    transition:0.2s;
}
.breadcrumb-item:hover {
    background:rgba(59,130,246,0.1);
    color:var(--text-primary);
}
.breadcrumb-separator {
    color:var(--text-muted);
    opacity:0.5;
}

/* Departments */
.departments-grid {
    display: flex;
    flex-direction: column;
    gap:10px;
    margin-bottom:24px;
}
.dept-card {
    display: flex;
    align-items:center;
    gap:16px;
    cursor:pointer;
    padding:6px;
    border-radius: var(--radius-lg);
    transition: var(--transition-base);
}
.dept-card:hover {
    background: var(--glass-bg);
    transform: translateX(6px);
}
.dept-oval {
    padding:12px 28px;
    border-radius: var(--radius-full);
    background: linear-gradient(145deg,#2563eb,#1d4ed8);
    display: flex;
    align-items:center;
    gap:10px;
    transition: transform 0.2s;
}
.dept-card:hover .dept-oval {
    transform: scale(1.03);
}
.dept-oval span {
    color:white;
    font-weight:700;
}
.dept-arrow {
    margin-left: auto;
    color:var(--text-muted);
}
.dept-info {
    font-size:0.75rem;
    background:rgba(0,0,0,0.25);
    padding:5px 14px;
    border-radius: var(--radius-full);
}
/* Department colors shortened for brevity — same as original but compact */
.dept-card[data-dept="REMELT"] .dept-oval { background: linear-gradient(145deg,#ea580c,#c2410c); }
.dept-card[data-dept="CASTER"] .dept-oval { background: linear-gradient(145deg,#0d9488,#0f766e); }
.dept-card[data-dept="HRM"] .dept-oval { background: linear-gradient(145deg,#7c3aed,#6d28d9); }
.dept-card[data-dept="CRM"] .dept-oval { background: linear-gradient(145deg,#d97706,#b45309); }
.dept-card[data-dept="ANNEALING"] .dept-oval { background: linear-gradient(145deg,#db2777,#be185d); }
.dept-card[data-dept="TLL"] .dept-oval { background: linear-gradient(145deg,#0891b2,#0e7490); }
.dept-card[data-dept="SLITTER"] .dept-oval { background: linear-gradient(145deg,#4f46e5,#4338ca); }
.dept-card[data-dept="UTILITY"] .dept-oval { background: linear-gradient(145deg,#dc2626,#b91c1c); }

/* ========== 3D CARDS with Tilt ========== */
.content {
    display: flex;
    flex-direction: column;
    gap:10px;
}
.card {
    background: var(--card-bg);
    backdrop-filter: blur(14px);
    padding: 14px 18px;
    border-radius: var(--radius-md);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap:14px;
    border: 1px solid var(--glass-border);
    transition: box-shadow 0.2s, background 0.2s;
    transform-style: preserve-3d;
    will-change: transform;
}
/* 3D hover fallback */
.card:hover {
    transform: translateY(-4px) rotateX(2deg) rotateY(2deg);
    background: var(--card-bg-hover);
    box-shadow: var(--shadow-lg);
}
/* Shimmer */
.card::after {
    content: '';
    position: absolute;
    top:0; left:-100%;
    width:100%; height:100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
    transition: left 0.5s;
    pointer-events: none;
}
.card:hover::after {
    left:100%;
}
/* Left accent bar */
.card::before {
    content: '';
    position: absolute;
    left:0; top:0; bottom:0;
    width:3px;
    background: linear-gradient(180deg, var(--accent-blue), var(--accent-purple));
    opacity:0;
    transition: opacity 0.2s;
    border-radius: var(--radius-md) 0 0 var(--radius-md);
}
.card:hover::before {
    opacity:1;
}
.card-icon {
    width:40px; height:40px;
    border-radius: var(--radius-sm);
    background: linear-gradient(135deg, rgba(59,130,246,0.15), rgba(139,92,246,0.1));
    display: flex;
    align-items:center;
    justify-content:center;
    transition: transform 0.2s, box-shadow 0.2s;
    transform-style: preserve-3d;
}
.card:hover .card-icon {
    transform: translateZ(8px) rotateX(6deg);
    box-shadow: 0 8px 15px rgba(0,0,0,0.2);
}
.card-icon i {
    font-size:1.1rem;
    color:var(--accent-blue);
    text-shadow: 0 1px 2px rgba(0,0,0,0.2);
}
.card-filename {
    flex:1;
    font-weight:500;
    font-size:0.9rem;
}
.card-buttons {
    display: flex;
    gap:8px;
}
.card-buttons button {
    padding:6px 12px;
    border-radius: var(--radius-full);
    font-size:0.7rem;
    font-weight:600;
    border:none;
    cursor:pointer;
    transition: all 0.1s ease;
}
.rename-file-btn {
    background: rgba(59,130,246,0.12);
    color:#93c5fd;
}
.delete-btn {
    background: rgba(244,63,94,0.12);
    color:#fda4af;
}
/* 3D press effect on all buttons */
button:active {
    transform: scale(0.96) translateY(2px);
    transition: transform 0.05s linear;
}

/* Action Bar */
.action-bar {
    display: flex;
    gap:10px;
    justify-content: center;
    margin-bottom:16px;
    padding:12px;
    background: var(--glass-bg);
    border-radius: var(--radius-full);
}
.action-btn {
    background: rgba(20,40,60,0.7);
    border:1px solid var(--glass-border);
    padding:10px 20px;
    border-radius: var(--radius-full);
    color:var(--text-primary);
    cursor:pointer;
    font-weight:600;
    transition: 0.2s;
}
.action-btn:hover {
    transform: translateY(-2px);
    background: linear-gradient(135deg,rgba(59,130,246,0.8),rgba(124,58,237,0.8));
    color:white;
}

.empty-state {
    text-align: center;
    padding:48px 24px;
    background: var(--card-bg);
    border-radius: var(--radius-lg);
}
.toast {
    position: fixed;
    bottom:32px;
    left:50%;
    transform: translateX(-50%) translateY(100px);
    background: linear-gradient(135deg,#10b981,#059669);
    color:white;
    padding:14px 24px;
    border-radius: var(--radius-full);
    z-index:1100;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
    opacity:0;
    pointer-events: none;
}
.toast.show {
    transform: translateX(-50%) translateY(0);
    opacity:1;
}
.loading-overlay {
    position: fixed;
    inset:0;
    background: rgba(7,13,26,0.85);
    backdrop-filter: blur(8px);
    z-index:2000;
    display: flex;
    align-items:center;
    justify-content:center;
    flex-direction: column;
    gap:20px;
}
.hidden { display: none !important; }

@media (max-width:640px) {
    .app { padding:16px 14px; }
    .search-container { flex:1; min-width:140px; }
    .btn-back { padding:8px 14px; }
    .theme-toggle { width:38px; height:38px; }
    .card-buttons button { padding:6px 12px; }
}
@media (max-width:380px) {
    .card-buttons { flex-direction: column; }
    .dept-info { display: none; }
}
</style>
</head>
<body>
<div class="particles-container"><div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div></div>
<div class="ambient-glow glow-1"></div>
<div class="ambient-glow glow-2"></div>

<div class="app">
  <header class="header">
    <div class="logo"><div class="logo-inner"><i class="fas fa-folder-open"></i></div><div class="logo-ring"></div></div>
    <div class="header-title">
      <div class="main-line"><h1>OARCEL</h1><span class="doc-tag"><i class="fas fa-shield-alt"></i> Document Manager</span></div>
      <div class="owner-name"><span class="owner-dot"></span><span>𝒜𝒷𝒾𝓈𝒽 𝑅𝒶𝒿𝒶𝓃</span></div>
    </div>
  </header>

  <div class="top-bar">
    <button id="backBtn" class="btn-back hidden"><i class="fas fa-arrow-left"></i><span>Back</span></button>
    <div class="search-container"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search documents..."><button id="clearSearchBtn" class="clear-search hidden"><i class="fas fa-times"></i></button></div>
    <div class="top-bar-actions"><button id="themeToggle" class="theme-toggle"><div class="theme-icon-wrapper"><i class="fas fa-moon"></i></div></button><button id="uploadBtn" class="btn-upload hidden"><i class="fas fa-cloud-upload-alt"></i><span>Upload</span></button></div>
    <input type="file" id="fileInput" accept="application/pdf" multiple>
  </div>

  <div class="stats-bar">
    <div class="stat-item"><div class="stat-icon-bg"><i class="fas fa-folder"></i></div><div class="stat-data"><span id="folderCount" class="stat-number">8</span><label>Folders</label></div></div>
    <div class="stat-divider"></div>
    <div class="stat-item"><div class="stat-icon-bg stat-icon-files"><i class="fas fa-file-pdf"></i></div><div class="stat-data"><span id="fileCount" class="stat-number">12</span><label>Documents</label></div></div>
  </div>

  <nav id="breadcrumb" class="breadcrumb"></nav>
  <div id="departmentsSection"></div>
  <div id="searchInfo" class="search-result-info hidden"></div>
  <div id="content" class="content"></div>
</div>

<div id="toast" class="toast hidden"><div class="toast-icon"><i class="fas fa-check-circle"></i></div><span></span></div>
<div id="loadingOverlay" class="loading-overlay hidden"><div class="loading-spinner"><div class="spinner-ring"></div><div class="spinner-ring"></div><div class="spinner-ring"></div></div><p>Loading...</p></div>

<script>
// ========== 3D TILT EFFECT (mouse-follow) ==========
function init3DTilt() {
    const cards = document.querySelectorAll('.card');
    cards.forEach(card => {
        const onMouseMove = (e) => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            const rotateY = ((x - centerX) / centerX) * 6;
            const rotateX = ((centerY - y) / centerY) * 6;
            requestAnimationFrame(() => {
                card.style.transform = `perspective(800px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-2px)`;
            });
        };
        const onMouseLeave = () => {
            requestAnimationFrame(() => {
                card.style.transform = '';
            });
        };
        card.addEventListener('mousemove', onMouseMove);
        card.addEventListener('mouseleave', onMouseLeave);
        // store to avoid duplicates on re-init
        card._tiltCleanup = () => {
            card.removeEventListener('mousemove', onMouseMove);
            card.removeEventListener('mouseleave', onMouseLeave);
        };
    });
}
// Observe dynamic content changes (since cards can be added/removed)
const contentDiv = document.getElementById('content');
if (contentDiv) {
    const observer = new MutationObserver(() => init3DTilt());
    observer.observe(contentDiv, { childList: true, subtree: true });
}
// Parallax for ambient glow orbs
document.addEventListener('mousemove', (e) => {
    const x = e.clientX / window.innerWidth;
    const y = e.clientY / window.innerHeight;
    const glow1 = document.querySelector('.glow-1');
    const glow2 = document.querySelector('.glow-2');
    if (glow1) glow1.style.transform = `translate(${x * 20}px, ${y * 20}px)`;
    if (glow2) glow2.style.transform = `translate(${-x * 15}px, ${-y * 15}px)`;
});
// Theme Toggle + localStorage
const themeToggle = document.getElementById('themeToggle');
if (themeToggle) {
    const savedTheme = localStorage.getItem('oarcel-theme');
    if (savedTheme === 'light') document.body.classList.add('light-mode');
    themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('light-mode');
        localStorage.setItem('oarcel-theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
    });
}
// ========== DEMO DATA (to showcase 3D cards) ==========
let currentDept = null;
let currentSubfolder = null;
const demoData = {
    'REMELT': { folders: ['FURNACE 1', 'FURNACE 2', 'FURNACE 3'], files: { 'FURNACE 1': ['temperature_log.pdf', 'maintenance_schedule.pdf'], 'FURNACE 2': ['energy_report.pdf'], 'FURNACE 3': [] } },
    'CASTER': { folders: ['MOLD A', 'MOLD B'], files: { 'MOLD A': ['casting_spec.pdf'], 'MOLD B': ['defect_analysis.pdf'] } },
    'HRM': { folders: ['POLICIES', 'EMPLOYEES'], files: { 'POLICIES': ['leave_policy.pdf'], 'EMPLOYEES': ['attendance.pdf'] } },
    'CRM': { folders: ['CUSTOMERS', 'LEADS'], files: { 'CUSTOMERS': ['customer_list.pdf'], 'LEADS': ['follow_up.pdf'] } },
    'ANNEALING': { folders: ['OVEN 1', 'OVEN 2'], files: { 'OVEN 1': ['temp_curve.pdf'], 'OVEN 2': [] } },
    'TLL': { folders: ['LOGISTICS'], files: { 'LOGISTICS': ['shipping_manifest.pdf'] } },
    'SLITTER': { folders: ['BLADE SETUP'], files: { 'BLADE SETUP': ['alignment_check.pdf'] } },
    'UTILITY': { folders: ['POWER', 'WATER'], files: { 'POWER': ['consumption.pdf'], 'WATER': ['quality_report.pdf'] } }
};
function renderDepartments() {
    const container = document.getElementById('departmentsSection');
    if (!container) return;
    const depts = Object.keys(demoData);
    container.innerHTML = `<div class="departments-grid">${depts.map(dept => `
        <div class="dept-card" data-dept="${dept}">
            <div class="dept-oval"><i class="fas fa-building"></i><span>${dept}</span></div>
            <div class="dept-arrow"><i class="fas fa-chevron-right"></i></div>
            <div class="dept-info">${demoData[dept].folders.length} folders</div>
        </div>
    `).join('')}</div>`;
    document.querySelectorAll('.dept-card').forEach(card => {
        card.addEventListener('click', () => {
            currentDept = card.getAttribute('data-dept');
            currentSubfolder = null;
            updateBreadcrumb();
            renderFolderView();
        });
    });
}
function renderFolderView() {
    const content = document.getElementById('content');
    if (!content) return;
    if (!currentDept) { content.innerHTML = '<div class="empty-state"><i class="fas fa-folder-open"></i><p>Select a department from above</p></div>'; return; }
    const dept = demoData[currentDept];
    if (!dept) return;
    if (!currentSubfolder) {
        // show subfolders
        content.innerHTML = `<div class="action-bar"><button class="action-btn" id="addSubfolderBtn"><i class="fas fa-plus"></i> Add Subfolder</button></div>
        <div class="departments-grid">${dept.folders.map(folder => `
            <div class="dept-card" data-folder="${folder}">
                <div class="dept-oval"><i class="fas fa-folder"></i><span>${folder}</span></div>
                <div class="dept-arrow"><i class="fas fa-chevron-right"></i></div>
                <div class="dept-info">${(dept.files[folder] || []).length} files</div>
            </div>
        `).join('')}</div>`;
        document.querySelectorAll('[data-folder]').forEach(el => {
            el.addEventListener('click', () => {
                currentSubfolder = el.getAttribute('data-folder');
                updateBreadcrumb();
                renderFolderView();
            });
        });
        const addBtn = document.getElementById('addSubfolderBtn');
        if(addBtn) addBtn.addEventListener('click', () => { toast('Subfolder demo – add logic here'); });
    } else {
        // show files
        const files = dept.files[currentSubfolder] || [];
        if(files.length === 0) {
            content.innerHTML = `<div class="empty-state"><i class="fas fa-file-pdf"></i><p>No documents in this folder</p></div><div class="action-bar"><button class="action-btn" id="uploadBtnInside"><i class="fas fa-upload"></i> Upload Document</button></div>`;
        } else {
            content.innerHTML = `<div class="action-bar"><button class="action-btn" id="uploadBtnInside"><i class="fas fa-upload"></i> Upload Document</button></div>
            ${files.map(file => `
                <div class="card">
                    <div class="card-icon"><i class="fas fa-file-pdf"></i></div>
                    <div class="card-filename">${file}</div>
                    <div class="card-buttons"><button class="rename-file-btn"><i class="fas fa-pen"></i> Rename</button><button class="delete-btn"><i class="fas fa-trash"></i> Delete</button></div>
                </div>
            `).join('')}`;
        }
        const upBtn = document.getElementById('uploadBtnInside');
        if(upBtn) upBtn.addEventListener('click', () => toast('Upload feature would open file picker'));
        // re-attach 3D tilt for new cards
        init3DTilt();
        // attach delete/rename mock
        document.querySelectorAll('.delete-btn').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); toast('Delete demo'); }));
        document.querySelectorAll('.rename-file-btn').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); toast('Rename demo'); }));
    }
}
function updateBreadcrumb() {
    const bc = document.getElementById('breadcrumb');
    if(!bc) return;
    let html = `<div class="breadcrumb-item" data-breadcrumb="home"><i class="fas fa-home"></i> Home</div>`;
    if(currentDept) {
        html += `<span class="breadcrumb-separator"><i class="fas fa-chevron-right"></i></span><div class="breadcrumb-item" data-breadcrumb="dept">${currentDept}</div>`;
    }
    if(currentSubfolder) {
        html += `<span class="breadcrumb-separator"><i class="fas fa-chevron-right"></i></span><div class="breadcrumb-item" data-breadcrumb="sub">${currentSubfolder}</div>`;
    }
    bc.innerHTML = html;
    bc.querySelectorAll('.breadcrumb-item').forEach(el => {
        el.addEventListener('click', () => {
            const type = el.getAttribute('data-breadcrumb');
            if(type === 'home') { currentDept = null; currentSubfolder = null; renderDepartments(); renderFolderView(); updateBreadcrumb(); }
            if(type === 'dept') { currentSubfolder = null; renderFolderView(); updateBreadcrumb(); }
            if(type === 'sub') { /* already there */ }
        });
    });
}
function toast(msg) {
    const toastEl = document.getElementById('toast');
    if(!toastEl) return;
    toastEl.querySelector('span').innerText = msg;
    toastEl.classList.add('show');
    setTimeout(() => toastEl.classList.remove('show'), 2500);
}
// Back button logic
const backBtn = document.getElementById('backBtn');
if(backBtn) {
    backBtn.addEventListener('click', () => {
        if(currentSubfolder) { currentSubfolder = null; renderFolderView(); updateBreadcrumb(); }
        else if(currentDept) { currentDept = null; renderDepartments(); renderFolderView(); updateBreadcrumb(); }
        backBtn.classList.add('hidden');
    });
}
function updateBackButton() {
    if(backBtn) {
        if(currentDept || currentSubfolder) backBtn.classList.remove('hidden');
        else backBtn.classList.add('hidden');
    }
}
// Override render functions to call updateBackButton
const origRenderFolderView = renderFolderView;
window.renderFolderView = function() { origRenderFolderView(); updateBackButton(); };
renderFolderView = window.renderFolderView;
const origRenderDepartments = renderDepartments;
window.renderDepartments = function() { origRenderDepartments(); updateBackButton(); };
renderDepartments = window.renderDepartments;
// initial
renderDepartments();
renderFolderView();
updateBackButton();
init3DTilt();
// upload button (hidden by default, but can be used)
document.getElementById('uploadBtn')?.addEventListener('click', () => document.getElementById('fileInput')?.click());
document.getElementById('fileInput')?.addEventListener('change', (e) => { if(e.target.files.length) toast(`Uploaded ${e.target.files.length} file(s) (demo)`); });
</script>
</body>
</html>
