<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>OARCEL | Document Management System</title>
  
  <!-- PWA Meta Tags for Mobile Installation -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="OARCEL">
  <meta name="theme-color" content="#3b82f6">
  <meta name="mobile-web-app-capable" content="yes">
  
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/337/337946.png">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="animated-bg"></div>

<div class="header">
  <div class="logo-container">
    <i class="fas fa-industry"></i>
  </div>
  <h1>OARCEL<span>Document Hub</span></h1>
  <div class="search-wrapper">
    <i class="fas fa-search"></i>
    <input type="text" id="search" placeholder="Search documents..." autocomplete="off">
  </div>
  <div class="header-glow"></div>
</div>

<div class="breadcrumb-wrapper">
  <div id="breadcrumb" class="breadcrumb">
    <i class="fas fa-home"></i> Dashboard
  </div>
</div>

<div id="statsBar" class="stats-bar"></div>
<div id="content" class="grid-container"></div>

<!-- Install PWA Prompt -->
<div id="installPrompt" class="install-prompt" style="display: none;">
  <div class="install-prompt-content">
    <i class="fas fa-download"></i>
    <div class="install-text">
      <strong>Install OARCEL</strong>
      <span>Add to home screen for easy access</span>
    </div>
    <button id="installBtn" class="install-btn">Install</button>
    <button id="closeInstallBtn" class="close-install-btn"><i class="fas fa-times"></i></button>
  </div>
</div>

<!-- PDF viewer section -->
<div id="viewerWrapper" class="viewer-container" style="display: none;">
  <div class="viewer-header">
    <span><i class="fas fa-file-pdf"></i> Document Preview</span>
    <button id="closeViewerBtn" class="close-viewer"><i class="fas fa-times"></i> Close</button>
  </div>
  <iframe id="pdfIframe" title="PDF Viewer" src="about:blank"></iframe>
</div>

<script src="app.js"></script>
</body>
</html>
