<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OARCEL | Document Manager</title>
</head>
<body>

<!-- Header Section -->
<header>
  <div class="logo">
    <div class="logo-inner">
      <i>📁</i>
    </div>
  </div>
  
  <div class="header-title">
    <h1>OARCEL</h1>
    <span>Document Manager</span>
  </div>
  
  <!-- Owner Name - Small size, positioned at right side corner of folder area -->
  <div class="owner-name">
    <span>𝓐𝓫𝓲𝓼𝓱 𝓡𝓪𝓳𝓪𝓷</span>
  </div>
</header>

<!-- Top Bar -->
<div class="top-bar">
  <button>Back</button>
  <div>
    <button>PDFs</button>
    <button>Notes</button>
  </div>
  <div>
    <input type="text" placeholder="Search documents...">
  </div>
  <div>
    <button>Upload</button>
    <button>New Note</button>
  </div>
</div>

<!-- Stats Bar -->
<div class="stats-bar">
  <div>📁 Folders: 0</div>
  <div>📄 PDFs: 0</div>
  <div>📝 Notes: 0</div>
</div>

<!-- Breadcrumb Navigation -->
<nav>
  <button>Home</button>
</nav>

<!-- Content Area -->
<div class="content">
  <p>Document manager content goes here...</p>
</div>

<!-- Modal (hidden by default) -->
<div>
  <h3>New Note</h3>
  <input type="text" placeholder="Note title...">
  <textarea placeholder="Write your note here..."></textarea>
  <div>
    <button>Cancel</button>
    <button>Save Note</button>
  </div>
</div>

<!-- Toast Message (hidden by default) -->
<div>
  <span>✓</span>
  <span></span>
</div>

</body>
</html>
