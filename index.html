*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-primary:linear-gradient(135deg,#0f0c29,#1a1a3e,#24243e);--bg-card:rgba(255,255,255,0.06);--text-primary:#fff;--text-secondary:#aaa;--border-color:rgba(255,255,255,0.1)}
body.light-mode{--bg-primary:#f5f5f5;--bg-card:#ffffff;--text-primary:#1a1a1a;--text-secondary:#666;--border-color:#e0e0e0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh}
.app{max-width:1200px;margin:0 auto;padding:20px}

.logo{width:52px;height:52px;background:linear-gradient(135deg,#6366f1,#ec4899);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:1.6rem}

.header-title span{font-size:0.7rem;color:#a855f7}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;gap:12px;flex-wrap:wrap;background:rgba(0,0,0,0.3);padding:10px 18px;border-radius:60px}

.btn-back{background:rgba(255,255,255,0.1);color:var(--text-primary)}
.btn-upload{background:linear-gradient(135deg,#6366f1,#ec4899);color:#fff}
